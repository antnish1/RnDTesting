const PART_MASTER_CACHE = new Map();
const PART_USAGE_30D_CACHE = new Map();

function normalizePartNo(partNo){
  return (partNo || "").toString().replace(/\s/g, "").toUpperCase();
}

async function getPartMasterByPartNo(partNo){
  const normalizedPartNo = normalizePartNo(partNo);
  if(!normalizedPartNo) return null;

  if(PART_MASTER_CACHE.has(normalizedPartNo)){
    return PART_MASTER_CACHE.get(normalizedPartNo);
  }

  const { data } = await db
    .from("part_master")
    .select("PartNo, Description, DNP, Cat1")
    .eq("PartNo", normalizedPartNo)
    .maybeSingle();

  PART_MASTER_CACHE.set(normalizedPartNo, data || null);
  return data || null;
}

async function getLast30QtyByBranchPart(branch, partNo){
  const normalizedPartNo = normalizePartNo(partNo);
  const key = `${branch || ""}__${normalizedPartNo}`;
  if(PART_USAGE_30D_CACHE.has(key)){
    return PART_USAGE_30D_CACHE.get(key);
  }

  const last30 = new Date();
  last30.setDate(last30.getDate() - 30);

  const { data: history } = await db
    .from("requests")
    .select("Qty, editedqty")
    .eq("Branch", branch)
    .eq("PartNo", normalizedPartNo)
    .neq("Status", "REJECTED")
    .neq("ApprovalStatus", "Rejected")
    .gte("created_at", last30.toISOString());

  let total30 = 0;
  (history || []).forEach(r => {
    total30 += getEffectiveQty(r);
  });

  PART_USAGE_30D_CACHE.set(key, total30);
  return total30;
}

function calc(tr){

  const qtyInput = tr.querySelector(".qty");

  let qty = Number(qtyInput.value) || 0;

  // ✅ FIX: prevent negative BEFORE calculation
  if (qty < 0) {
    qty = 0;

  }

  const dnp = Number(tr.querySelector(".dnp").innerText) || 0;

  const value = dnp * qty;

  });

  calcTotal();
}

    t += Number(clean) || 0;

}

// ---------- SUBMIT ----------
async function submitOrder(){

const user = getUser();
const machineNo = document.getElementById("machineNo").value;
const customerName = document.getElementById("customerName").value;


const orderType = document.getElementById("orderType").value;
const orderFor = document.getElementById("orderFor").value;
const approvedBy = document.getElementById("approvedBy").value;
const machineType = document.getElementById("machineType").value;

// BASIC REQUIRED
if(!orderType || !orderFor){
  return showPopup("Order Details are mandatory ❗");
}

// VOR RULE
if(orderType === "VOR"){
  if(!approvedBy || !machineNo || !customerName || !machineType){
    return showPopup("All fields mandatory for VOR ❗");
  }
}

// 🔥 APPROVER MUST BE SELECTED FOR ALL ORDERS
if(!approvedBy){
  return showPopup("Please select Approver ❗");
}
// SOP / ZSPL / ZMAC RULES
if(orderType === "SOP" || orderType === "ZSPL" || orderType === "ZMAC"){

  if(!orderFor){
    return showPopup("Order For required ❗");
  }

  if(orderFor === "Customer"){
    if(!machineNo || !machineType){
      return showPopup("Machine No & Type required ❗");
    }
  }
}
  
if(orderFor === "Customer" && (!machineNo || !customerName)){
  return showPopup("Fill machine & customer ❗");
}

const rows = document.querySelectorAll("#tbody tr");
let hasError = false;

const orderNo = "T" + Math.floor(1000000 + Math.random()*9000000);

const inserts = [];

for (const r of rows){

  if(hasError) return;

  const part = r.querySelector(".part").value.trim();
  const qty = r.querySelector(".qty").value.trim();
  const desc = r.querySelector(".desc").innerText;
  const dnp = Number(r.querySelector(".dnp").innerText)||0;

  if (part) {

    const qtyNum = Number(qty);

    // ❗ Qty validation
    if (!qty) {
      showPopup("Qty is required for all parts ❗");
      hasError = true;
      return;
    }

    if (qtyNum < 1) {
      showPopup("Qty cannot be less than 1 ❗", "error");
      hasError = true;
      return;
    }

    // ❗ PART VALIDATION (IMPORTANT)
    if (!desc || desc.trim() === "") {
      showPopup(`Invalid Part Number: ${part} ❗`, "error");
      hasError = true;
      return;
    }
  }

  if(!part) continue;

  const qtyLast30 = await getLast30QtyByBranchPart(user.Branch, part);

  inserts.push({
    Branch: user.Branch,

    OrderType: orderType,
    OrderFor: orderFor,

    EmployeeName: user.Name || "",
    ApprovedBy: approvedBy,
    WarrantyStatus: machineType,
    CallID: document.getElementById("callId").value || "",
    MachineNo: machineNo,
    CustomerName: customerName,

    PartNo: part,
    Qty: qty,
    ["30dQty"]: qtyLast30,
    Description: desc,
    DNP: dnp,
    Value: dnp * qty,

    OrderNo: orderNo,
    Status: "PENDING APPROVAL",
    ApprovalStatus: "PendingApproval"
  });

}

if(hasError){
  return;
}
if(!inserts.length){
  return showPopup("At least one Part Number is required ❗");
}

showLoader();

const { error } = await db.from("requests").insert(inserts);

hideLoader();

if(error) return showPopup("Submit failed");

await appendOrderActionLog(orderNo, "ORDER_CREATED", `Order placed by ${getUser()?.Name || "Unknown User"}.`);
showPopup("Submitted ✅ Order No: "+orderNo);

loadCreate();
}

  const uniqueOrders = Object.entries(grouped)

    .map(([orderNo]) => orderNo);

  const el = document.getElementById("pendingCount");

  if(el){
    if(count > 0){
      el.innerText = count;
      el.classList.remove("hidden");
    } else {
      el.classList.add("hidden");
    }
  }
}

function formatDate(val){

  if(!val) return "-";

  // ✅ Case 1: ISO date (ProcessedDate)
  if(val.includes("T")){
    const d = new Date(val);
    return d.toLocaleDateString("en-GB"); // dd/mm/yyyy
  }

  // ✅ Case 2: Excel number (OrderRegDt, BillingDt)
  if(!isNaN(val)){
    const excelDate = new Date((val - 25569) * 86400 * 1000);
    return excelDate.toLocaleDateString("en-GB");
  }

  return val;
}

function formatDateTime(val){
  if(!val) return "-";

  const d = new Date(val);

  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = String(d.getFullYear()).slice(-2);

  // 🔥 12-HOUR FORMAT LOGIC
  let hours = d.getHours();
  const ampm = hours >= 12 ? 'PM' : 'AM';

  hours = hours % 12 || 12; // convert 0 → 12
  hours = String(hours).padStart(2, '0');

  const mins = String(d.getMinutes()).padStart(2, '0');

  return `${day}-${month}-${year} ${hours}:${mins} ${ampm}`;
}

function getEffectiveQty(row){
  const edited = row?.editedqty ?? row?.EditedQty;
  if(edited === null || edited === undefined || edited === ""){
    return Number(row?.Qty || 0);
  }
  return Number(edited || 0);
}

function getEffectiveValue(row){
  const edited = row?.editedvalue ?? row?.EditedValue;
  if(edited === null || edited === undefined || edited === ""){
    return Number(row?.Value || 0);
  }
  return Number(edited || 0);
}

function normalizeRowStatus(status){
  const s = (status || "").toString().trim().toUpperCase();

  if(s.includes("DESPATCHED") || s.includes("DISPATCHED")){
    return s.includes("NOT") ? "NOT DESPATCHED" : "DISPATCHED";
  }
  if(s.includes("REJECT")) return "REJECTED";
  if(s.includes("PROCESS")) return "PROCESSED";
  if(s.includes("PENDING APPROVAL") || s.includes("APPROVAL PENDING") || s === "PENDINGAPPROVAL"){
    return "PENDING APPROVAL";
  }
  if(s.includes("PEND")) return "APPROVED";

  return s || "PENDING APPROVAL";
}

function getOrderStatusLabel(order){
  const items = Array.isArray(order?.items) ? order.items : (Array.isArray(order) ? order : []);
  if(!items.length) return "PENDING APPROVAL";

  const statuses = items.map(x => normalizeRowStatus(x?.Status));
  const hasRejected = items.some(x => {
    const approval = (x?.ApprovalStatus || "").toString().trim().toUpperCase();
    return normalizeRowStatus(x?.Status) === "REJECTED" || approval === "REJECTED";
  });
  const hasPendingApproval = items.some(x =>
    normalizeRowStatus(x?.Status) === "PENDING APPROVAL" || isPendingApprovalStatus(x?.ApprovalStatus)
  );

  if(hasRejected) return "REJECTED";
  if(statuses.every(s => s === "DISPATCHED")) return "DISPATCHED";
  if(statuses.includes("DISPATCHED")) return "PARTIALLY DISPATCHED";
  if(statuses.every(s => s === "NOT DESPATCHED")) return "NOT DESPATCHED";
  if(statuses.every(s => s === "PROCESSED")) return "PROCESSED";
  if(statuses.every(s => s === "PENDING APPROVAL") || hasPendingApproval) return "PENDING APPROVAL";
  if(statuses.some(s => s === "APPROVED")) return "APPROVED";

  return statuses[0] || "PENDING APPROVAL";
}

function getStatusChipStyle(status){
  const s = normalizeRowStatus(status);
  const palette = {
    "PENDING APPROVAL": { bg:"#fff7ed", text:"#9a3412", border:"#fdba74" },
    "APPROVED": { bg:"#ecfdf5", text:"#065f46", border:"#86efac" },
    "PROCESSED": { bg:"#eff6ff", text:"#1e3a8a", border:"#93c5fd" },
    "DISPATCHED": { bg:"#dcfce7", text:"#166534", border:"#86efac" },
    "PARTIALLY DISPATCHED": { bg:"#fef3c7", text:"#92400e", border:"#fcd34d" },
    "NOT DESPATCHED": { bg:"#eef2ff", text:"#3730a3", border:"#c4b5fd" },
    "REJECTED": { bg:"#fef2f2", text:"#991b1b", border:"#fca5a5" }
  };
  const p = palette[s] || { bg:"#f8fafc", text:"#334155", border:"#cbd5e1" };
  return `background:${p.bg}; color:${p.text}; border:1px solid ${p.border}; white-space:nowrap; display:inline-flex; align-items:center; line-height:1.05;`;
}

function getOrderTypeRowStyle(orderType){
  const type = (orderType || "").toString().trim().toUpperCase();
  if(type === "VOR"){
    return "background: linear-gradient(90deg, rgba(245,158,11,0.18), rgba(245,158,11,0.04)); border-left: 4px solid #f59e0b;";
  }
  return "background: rgba(15,23,42,0.03); border-left: 4px solid transparent;";
}

function applyOrderSort(orders){
  if(!TABLE_SORT_STATE?.key || !TABLE_SORT_STATE?.dir) return orders;
  const key = TABLE_SORT_STATE.key;
  const dir = TABLE_SORT_STATE.dir === "asc" ? 1 : -1;
  const sorted = [...orders];

  sorted.sort((a, b) => {
    const qtyA = (a.items || []).reduce((s,x)=>s+getEffectiveQty(x),0);
    const qtyB = (b.items || []).reduce((s,x)=>s+getEffectiveQty(x),0);
    const valA = (a.items || []).reduce((s,x)=>s+getEffectiveValue(x),0);
    const valB = (b.items || []).reduce((s,x)=>s+getEffectiveValue(x),0);

    const map = {
      "DATE": [new Date(a.created_at).getTime() || 0, new Date(b.created_at).getTime() || 0],
      "ORDER TYPE": [(a.OrderType || "").toLowerCase(), (b.OrderType || "").toLowerCase()],
      "ORDER FOR": [((a.OrderFor === "Customer" ? a.CustomerName : "Stock") || "").toLowerCase(), ((b.OrderFor === "Customer" ? b.CustomerName : "Stock") || "").toLowerCase()],
      "CUSTOMER": [((a.CustomerName || "Stock") || "").toLowerCase(), ((b.CustomerName || "Stock") || "").toLowerCase()],
      "BRANCH": [(a.Branch || "").toLowerCase(), (b.Branch || "").toLowerCase()],
      "QTY": [qtyA, qtyB],
      "VALUE": [valA, valB],
      "ORDER NO": [(a.OrderNo || "").toLowerCase(), (b.OrderNo || "").toLowerCase()],
      "STATUS": [getOrderStatusLabel(a).toLowerCase(), getOrderStatusLabel(b).toLowerCase()]
    };

    const pair = map[key] || [new Date(a.created_at).getTime() || 0, new Date(b.created_at).getTime() || 0];
    if(typeof pair[0] === "number" && typeof pair[1] === "number"){
      return (pair[0] - pair[1]) * dir;
    }
    return pair[0].localeCompare(pair[1]) * dir;
  });

  return sorted;
}

function isPendingApprovalStatus(val){
  const s = (val || "").toString().trim().toUpperCase();
  return s === "PENDINGAPPROVAL" ||
    s === "PENDING APPROVAL" ||
    s === "APPROVAL PENDING" ||
    s === "PENDINGMANAGERAPPROVAL" ||
    s === "PENDING MANAGER APPROVAL";
}

function parseOrderComments(raw){
  if(!raw) return [];
  try{
    const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
    return Array.isArray(parsed) ? parsed : [];
  }catch{
    return [];
  }
}

function isSystemActionComment(comment){
  return (comment?.type || "").toString().trim().toLowerCase() === "system_action";
}

function getOrderComments(orderObj){
  const uniqueComments = (items) => {
    const seen = new Set();
    return items.filter(c => {
      const key = [
        c?.by || "",
        c?.text || "",
        c?.at || "",
        c?.attachmentName || "",
        c?.attachmentUrl || ""
      ].join("|");
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  };

  if(Array.isArray(orderObj?.items)){
    for(const row of orderObj.items){
      const parsed = parseOrderComments(row?.OrderComments);
      if(parsed.length) return uniqueComments(parsed);
    }
  }
  return uniqueComments(parseOrderComments(orderObj?.OrderComments));
}

function getUserComments(orderObj){
  return getOrderComments(orderObj).filter(c => !isSystemActionComment(c));
}

function getOrderCommentCount(orderObj){
  return getUserComments(orderObj).length;
}

function shouldShowOrder(orderObj){
  const items = Array.isArray(orderObj?.items) ? orderObj.items : [];
  const totalQty = items.reduce((sum, x) => sum + getEffectiveQty(x), 0);
  const totalValue = items.reduce((sum, x) => sum + getEffectiveValue(x), 0);
  return !(totalQty === 0 && totalValue === 0);
}

function getCommentUserBg(by){

  let hash = 0;
  for(let i = 0; i < name.length; i++){
    hash = (hash + name.charCodeAt(i)) % palettes.length;

  return palettes[hash];
}

const commentAttachmentHrefCache = {};
function getCommentAttachmentHref(url){
  if(!url) return "";
  if(!url.startsWith("data:")) return url;
  if(commentAttachmentHrefCache[url]) return commentAttachmentHrefCache[url];
  try{
    const [meta, base64] = url.split(",");
    const mime = (meta.match(/data:(.*?);base64/) || [])[1] || "application/octet-stream";
    const binary = atob(base64 || "");
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for(let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
    const blobUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));
    commentAttachmentHrefCache[url] = blobUrl;
    return blobUrl;
  }catch{
    return url;
  }
}

async function processOrder(orderNo){

  const inputOrderNo = document.getElementById("processOrderNo").value.trim();

  if(!inputOrderNo){
    return showPopup("Enter Order No ❗");
  }

  // ✅ SAME ORDER CHECK
  if(inputOrderNo === orderNo){
    return showPopup("Already same Order No ❗");
  }

  // ✅ 🔥 ADD THIS BLOCK HERE
  const { data: existing } = await db
    .from("requests")
    .select("OrderNo")
    .eq("OrderNo", inputOrderNo);

  if(existing && existing.length > 0){
    return showPopup("Order No already exists ❗");
  }

  // ⬇️ THIS WAS ALREADY THERE
  showLoader();

  const { error } = await db
    .from("requests")
    .update({ 
      OrderNo: inputOrderNo,
      Status: "Processed"
    })
    .eq("OrderNo", orderNo);

  hideLoader();

  if(error){
    console.error(error);
      
    return showPopup("Error updating Order ❗");
  }

  await appendOrderActionLog(inputOrderNo, "ADMIN_PROCESSED", `Order marked as Processed by ${getUser()?.Name || "Unknown User"}.`);
  showPopup("Order Updated & Processed ✅");

  loadAdmin("Processed");
}

async function processExcelData(rows){

  showLoader();

  let updated = 0;
  let skipped = 0;
  const statusLoggedOrders = new Set();

  for(const r of rows){
    console.log("🟡 RAW EXCEL ROW:", r);
    const orderNo = r["Order No"]?.toString().trim().toUpperCase();
    const partNo = r["Material No"]?.toString().trim().toUpperCase();
    console.log("📦 Excel OrderNo:", orderNo);
    console.log("🔩 Excel PartNo:", partNo);
    
    const status = r["Status"]?.toString().trim();

    // ❗ SKIP INVALID ROWS
    if(!orderNo || !partNo){
      skipped++;
      continue;
    }

    // 🔍 CHECK IF MATCH EXISTS FIRST (SAFE UPDATE)
    const { data: existing } = await db
      .from("requests")
      .select("id")
      .eq("OrderNo", orderNo)
      .eq("PartNo", partNo.replace(/\s/g,"").toUpperCase())
      .maybeSingle();
      console.log("🧾 DB MATCH RESULT:", existing);
   if(!existing){
      console.log("❌ NO MATCH FOUND");
      console.log("Excel:", orderNo, partNo);
      skipped++;
      continue;
    } else {
      console.log("✅ MATCH FOUND");
      console.log("DB Row:", existing);
    }

    // ✅ UPDATE ONLY MATCHED ROW
    const { error } = await db
      .from("requests")
      .update({
        Status: status || "Processed",

        ProcessedDate: new Date().toISOString(),

        OrderRegDt: r["Order Reg. Dt"] || "",
        DeliveryNo: r["Delivery No"] || "",
        BillNo: r["BillNo & Image"] || "",
        BillingDt: r["Billing Dt"] || "",
        BilledQty: Number(r["Billed Qty"] || 0),
        TransportName: r["Transport Name"] || "",
        TransportMode: r["Transport Mode"] || "",
        Docket: r["Docket"] || "",
        PackingDetail: r["Packing Detail"] || "",
        EWayBillNo: r["E-Way Bill No"] || "",
        GSTInvoiceNo: r["GST Invoice No."] || ""
        
      })
      .eq("OrderNo", orderNo)
      .eq("PartNo", partNo.replace(/\s/g,"").toUpperCase());

    if(!error){
      updated++;
      if(!statusLoggedOrders.has(orderNo)){
        await appendOrderActionLog(
          orderNo,
          "STATUS_UPDATED",
          `Status updated to ${(status || "Processed")} via upload by ${getUser()?.Name || "Unknown User"}.`,
          { status: status || "Processed" }
        );
        statusLoggedOrders.add(orderNo);
      }
    } else {
      console.error(error);
      skipped++;
    }
  }

  hideLoader();

  showPopup(`Upload Complete ✅\nUpdated: ${updated}\nSkipped: ${skipped}`);

  loadAdmin(window.activeTab);
}




async function processPartsUploadFlexible(rows){

  cancelUploadFlag = false;

  showLoader();

  let success = 0;
  let failed = 0;

  // ✅ MERGE DUPLICATES
  const merged = {};

  rows.forEach(r=>{
    const part = r[0]?.toString().trim().toUpperCase();
    const qty = Number(r[1]);

    if(!part || !qty) return;

    if(!merged[part]){
      merged[part] = 0;
    }

    merged[part] += qty;
  });

  const finalRows = Object.entries(merged);

  // ✅ SHOW PROGRESS UI
  document.getElementById("uploadProgress").classList.remove("hidden");

  document.getElementById("pTotal").innerText = finalRows.length;

  let processed = 0;

  for(const [partNo, qty] of finalRows){

    if(cancelUploadFlag){
      showPopup("Upload Cancelled ❗", "warning");
      break;
    }

    const data = await getPartMasterByPartNo(partNo);

    if(!data){
      failed++;
    } else {

      addRow();

      const tr = document.querySelector("#tbody tr:last-child");

      tr.querySelector(".part").value = partNo;
      tr.querySelector(".qty").value = qty;

      tr.querySelector(".desc").innerText = data.Description;
      tr.querySelector(".dnp").innerText = data.DNP;
      tr.querySelector(".cat").innerText = data.Cat1;

      calc(tr);

      success++;
    }

    processed++;

    // ✅ UPDATE PROGRESS
    const percent = Math.floor((processed / finalRows.length) * 100);

    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("pSuccess").innerText = success;
    document.getElementById("pFailed").innerText = failed;
    document.getElementById("pRemaining").innerText =
      finalRows.length - processed;

    document.getElementById("progressText").innerText =
      `Processing ${processed}/${finalRows.length}`;

    await new Promise(r => setTimeout(r, 20));
  }

  hideLoader();

  setTimeout(()=>{
    document.getElementById("uploadProgress").classList.add("hidden");
  }, 800);

  showPopup(
    `Upload Complete ✅\n\n✔ Uploaded: ${success}\n❌ Failed: ${failed}`,
    success > 0 ? "success" : "error"
  );
}

async function handlePartsUpload(hasHeader){

  closePopup();

  const file = window.uploadFile;
  if(!file) return;

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);

  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  // 👇 IMPORTANT CHANGE
  let rows = XLSX.utils.sheet_to_json(sheet, {
    header: 1   // returns array format
  });

  // ❗ REMOVE HEADER ROW IF USER SAID YES
  if(hasHeader){
    rows.shift();
  }

  processPartsUploadFlexible(rows);
}

function handleUniversalSearch(value){

  if(!search){
    refreshCurrentView();
    return;
  }

  const filtered = GLOBAL_DATA.filter(r => {

    return (
      (r.OrderNo || "").toLowerCase().includes(search) ||
      (r.PartNo || "").toLowerCase().includes(search) ||
      (r.CustomerName || "").toLowerCase().includes(search) ||
      (r.MachineNo || "").toLowerCase().includes(search) ||
      (r.Branch || "").toLowerCase().includes(search) ||
      (r.OrderType || "").toLowerCase().includes(search) ||
      (r.Status || "").toLowerCase().includes(search)
    );

  });

  renderSearchResults(filtered);
}

function renderManagerDashboard(orders){
  const allOrders = orders || [];
  const today = new Date().toISOString().slice(0, 10);
  const firstDayOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().slice(0, 10);
  window.managerDashDateRange = window.managerDashDateRange || { from: firstDayOfMonth, to: today };
  window.managerDashFilter = window.managerDashFilter || { type: "status", key: "PENDING APPROVAL", label: "PENDING APPROVAL" };
  window.managerDashTableVisible = window.managerDashTableVisible !== false;

  const fromDate = window.managerDashDateRange.from ? new Date(window.managerDashDateRange.from + "T00:00:00") : null;
  const toDate = window.managerDashDateRange.to ? new Date(window.managerDashDateRange.to + "T23:59:59") : null;

  const safeOrders = allOrders.filter(o => {
    const d = new Date(o.created_at || 0);
    if(fromDate && d < fromDate) return false;
    if(toDate && d > toDate) return false;
    return true;
  });

  const orderValue = (o) => (o.items || []).reduce((s, x) => s + Number(getEffectiveValue(x) || 0), 0);
  const statusKey = (o) => {
    const s = getOrderStatusLabel(o);
    if(s === "PARTIALLY DISPATCHED" || s === "DISPATCHED") return "DISPATCHED";
    return s;
  };
  const orderTypeKey = (o) => {
    const t = (o.OrderType || "").toUpperCase();
    if(t === "SOP"){
      return (o.OrderFor || "").toUpperCase() === "CUSTOMER" ? "SOP_CUSTOMER" : "SOP_STOCK";
    }
    return t || "OTHER";
  };
  const summaryFrom = (list) => ({
    count: list.length,
    value: list.reduce((s, o) => s + orderValue(o), 0)
  });
  const byStatus = (k) => summaryFrom(safeOrders.filter(o => statusKey(o) === k));
  const byType = (k) => summaryFrom(safeOrders.filter(o => orderTypeKey(o) === k));

  const statusCards = [
    { key: "ALL", label: "TOTAL ORDERS", ...summaryFrom(safeOrders), color: "#1e3a8a", bg1:"#dbeafe", bg2:"#eff6ff" },
    { key: "PENDING APPROVAL", label: "PENDING APPROVAL", ...byStatus("PENDING APPROVAL"), color: "#b45309", bg1:"#fef3c7", bg2:"#fffbeb" },
    { key: "APPROVED", label: "APPROVED", ...byStatus("APPROVED"), color: "#166534", bg1:"#dcfce7", bg2:"#f0fdf4" },
    { key: "REJECTED", label: "REJECTED", ...byStatus("REJECTED"), color: "#b91c1c", bg1:"#fee2e2", bg2:"#fff1f2" },
    { key: "PROCESSED", label: "PROCESSED", ...byStatus("PROCESSED"), color: "#7c3aed", bg1:"#ede9fe", bg2:"#f5f3ff" },
    { key: "DISPATCHED", label: "DISPATCHED / P.DISPATCHED", ...byStatus("DISPATCHED"), color: "#0f766e", bg1:"#ccfbf1", bg2:"#f0fdfa" }
  ];

  const typeCards = [
    { key: "VOR", label: "VOR", ...byType("VOR"), color: "#92400e", bg1:"#ffedd5", bg2:"#fff7ed" },
    { key: "ZMAC", label: "ZMAC", ...byType("ZMAC"), color: "#4338ca", bg1:"#e0e7ff", bg2:"#eef2ff" },
    { key: "ZSPL", label: "ZSPL", ...byType("ZSPL"), color: "#0369a1", bg1:"#dbeafe", bg2:"#f0f9ff" },
    { key: "LUBES", label: "LUBES", ...byType("LUBES"), color: "#166534", bg1:"#dcfce7", bg2:"#f0fdf4" },
    { key: "SOP_CUSTOMER", label: "SOP CUSTOMER", ...byType("SOP_CUSTOMER"), color: "#0f766e", bg1:"#ccfbf1", bg2:"#f0fdfa" },
    { key: "SOP_STOCK", label: "SOP STOCK", ...byType("SOP_STOCK"), color: "#334155", bg1:"#e2e8f0", bg2:"#f8fafc" }
  ];

  const branchMap = {};
  safeOrders.forEach(o => {
    const b = o.Branch || "-";
    if(!branchMap[b]){
      branchMap[b] = {
        branch: b,
        totalOrders: 0, totalValue: 0,
        pendingCount: 0, pendingValue: 0,
        approvedCount: 0, approvedValue: 0,
        rejectedCount: 0, rejectedValue: 0,
        processedCount: 0, processedValue: 0,
        dispatchedCount: 0, dispatchedValue: 0
      };
    }
    const row = branchMap[b];
    const val = orderValue(o);
    const sk = statusKey(o);
    row.totalOrders += 1;
    row.totalValue += val;
    if(sk === "PENDING APPROVAL"){ row.pendingCount += 1; row.pendingValue += val; }
    if(sk === "APPROVED"){ row.approvedCount += 1; row.approvedValue += val; }
    if(sk === "REJECTED"){ row.rejectedCount += 1; row.rejectedValue += val; }
    if(sk === "PROCESSED"){ row.processedCount += 1; row.processedValue += val; }
    if(sk === "DISPATCHED"){ row.dispatchedCount += 1; row.dispatchedValue += val; }
  });
  const branchRows = Object.values(branchMap).sort((a,b)=> b.totalValue - a.totalValue);

  let selectedOrders = safeOrders;
  const activeFilter = window.managerDashFilter;
  if(activeFilter?.type === "status" && activeFilter.key !== "ALL"){
    selectedOrders = safeOrders.filter(o => statusKey(o) === activeFilter.key);
  } else if(activeFilter?.type === "type"){
    selectedOrders = safeOrders.filter(o => orderTypeKey(o) === activeFilter.key);
  } else if(activeFilter?.type === "branch"){
    selectedOrders = safeOrders.filter(o => (o.Branch || "-") === activeFilter.key);
  }

  const cardHtml = (c, type) => {
    const active = activeFilter && activeFilter.type === type && activeFilter.key === c.key;
    return `
      <button onclick="setManagerDashboardCardFilter('${type}','${c.key}','${c.label.replace(/'/g, "\\'")}')"
        class="text-left rounded-lg p-2.5 border transition-all duration-300 hover:-translate-y-[4px] hover:scale-[1.03]"
        style="border-color:${active ? c.color : '#bfdbfe'}; background:linear-gradient(135deg, ${c.bg1}, ${c.bg2}); box-shadow:${active ? '0 14px 30px rgba(37,99,235,0.26)' : '0 6px 16px rgba(15,23,42,0.10)'};">
        <div class="text-[10px] font-semibold tracking-wider" style="color:${c.color};">${c.label}</div>
        <div class="mt-1 flex items-end justify-between">
          <div class="text-lg font-black" style="color:#0f172a;">${c.count}</div>
          <div class="text-[11px] font-semibold" style="color:#334155;">₹ ${Math.round(c.value).toLocaleString("en-IN")}</div>
        </div>
      </button>
    `;
  };

  const totalRow = branchRows.reduce((acc, b) => {
    acc.totalOrders += b.totalOrders; acc.totalValue += b.totalValue;
    acc.pendingCount += b.pendingCount; acc.pendingValue += b.pendingValue;
    acc.approvedCount += b.approvedCount; acc.approvedValue += b.approvedValue;
    acc.rejectedCount += b.rejectedCount; acc.rejectedValue += b.rejectedValue;
    acc.processedCount += b.processedCount; acc.processedValue += b.processedValue;
    acc.dispatchedCount += b.dispatchedCount; acc.dispatchedValue += b.dispatchedValue;
    return acc;
  }, {
    totalOrders:0,totalValue:0,pendingCount:0,pendingValue:0,approvedCount:0,approvedValue:0,rejectedCount:0,rejectedValue:0,processedCount:0,processedValue:0,dispatchedCount:0,dispatchedValue:0
  });

async function loadSuper(activeTab = "PendingApproval", skipReset = false){

    query = query.or(`ApprovedBy.eq.${user.Name},ApprovedBySuper.eq.${user.Name}`);
  }

  const { data } = await query;

const grouped = {};

  // ✅ ADD THIS LINE (MANDATORY FIX)
  if(!r.ApprovalStatus || isPendingApprovalStatus(r.ApprovalStatus)){
    r.ApprovalStatus = "PendingApproval";
    r.Status = "PENDING APPROVAL";
  }

    grouped[r.OrderNo] = { ...r, items:[] };

});

  const orders = applyOrderSort(
    Object.values(grouped).sort((a, b) => new Date(b.created_at) - new Date(a.created_at))

if(activeTab === "PendingApproval"){
  filtered = orders.filter(o => {

    if(isManager) return true;
    const forwardedByCurrentSuper = o.items.some(x => {
      const approval = (x.ApprovalStatus || "").toString().trim().toUpperCase();
      return (approval === "PENDINGMANAGERAPPROVAL" || approval === "PENDING MANAGER APPROVAL")
        && (x.ApprovedBySuper || "") === (user?.Name || "");

    return !forwardedByCurrentSuper;

}
else if(activeTab === "Approved"){
  filtered = orders.filter(o => {
    const approved = getOrderStatusLabel(o) === "APPROVED";

    const forwardedByCurrentSuper = o.items.some(x => {

async function getDefaultManagerApprover(excludeName = ""){
  const query = db
    .from("users")
    .select("Name")
    .eq("Role", "manager");

  const { data, error } = await (excludeName ? query.neq("Name", excludeName) : query);
  if(error || !data?.length) return "";
  return data[0].Name || "";
}

async function updateApproval(orderNo, status){

  showLoader();
  const user = getUser();
  const isManager = isManagerRole(user);

  const approvalUpdateData = { ApprovalStatus: status };
  if(status === "Approved"){
    if(isManager){
      approvalUpdateData.Status = "Approved";
      approvalUpdateData.ApprovalStatus = "Approved";
      approvalUpdateData.ApprovedAt = new Date().toISOString();
    } else {
      const managerName = await getDefaultManagerApprover(user?.Name || "");
      if(managerName){
        approvalUpdateData.Status = "PENDING APPROVAL";
        approvalUpdateData.ApprovalStatus = "PendingManagerApproval";
        approvalUpdateData.ApprovedBy = managerName;
        approvalUpdateData.ApprovedBySuper = user.Name || "";
        approvalUpdateData.ApprovedAt = new Date().toISOString();
      } else {
        // Fallback: if no manager configured, keep existing single-step behavior.
        approvalUpdateData.Status = "Approved";
        approvalUpdateData.ApprovalStatus = "Approved";
        approvalUpdateData.ApprovedBySuper = user.Name || "";
        approvalUpdateData.ApprovedAt = new Date().toISOString();
      }
    }
  } else if(status === "Rejected"){
    approvalUpdateData.Status = "Rejected";
  }

  const { error } = await db
    .from("requests")
    .update(approvalUpdateData)
    .eq("OrderNo", orderNo);

  hideLoader();

  if(error){
    return showPopup("Update failed ❌");
  }

  await appendOrderActionLog(
    orderNo,
    status === "Approved"
      ? (isManager ? "MANAGER_APPROVED" : "SUPER_FORWARDED_MANAGER")
      : (isManager ? "MANAGER_REJECTED" : "SUPER_REJECTED"),
    status === "Approved"
      ? (isManager
          ? `Order approved by ${user.Name || "Unknown User"}.`
          : `Order approved by ${user.Name || "Unknown User"} and forwarded to manager.`)
      : `Order rejected by ${user.Name || "Unknown User"}.`
  );
  showPopup("Updated successfully ✅");

  loadSuper(window.activeTab);
}

async function saveEditedQty(orderNo, rowId, partNo, createdAt, value, originalQty, originalValue){
  const parsed = value === "" ? null : Math.max(0, Number(value || 0));
  const baseQty = Number(originalQty || 0);
  const baseValue = Number(originalValue || 0);
  const unitValue = baseQty > 0 ? (baseValue / baseQty) : 0;
  const recalculatedValue = parsed === null ? null : Number((unitValue * parsed).toFixed(2));

  showLoader();
  let query = db
    .from("requests")
    .update({ editedqty: parsed, editedvalue: recalculatedValue });

  if(rowId){
    query = query.eq("id", rowId);
  }else{
    query = query.eq("OrderNo", orderNo).eq("PartNo", partNo);
    if(createdAt) query = query.eq("created_at", createdAt);
  }

  const { error } = await query;
  hideLoader();

  if(error){
    return showPopup("Failed to save edited qty ❌");
  }

  if(!window.superAcceptedEdits) window.superAcceptedEdits = {};
  window.superAcceptedEdits[orderNo] = false;

  openOrderView(orderNo);
}

async function appendOrderActionLog(orderNo, action, text, meta = {}){
  try{
    const user = getUser() || {};
    const actor = user.Name || "Unknown User";
    const nowIso = new Date().toISOString();

    const { data: firstRow, error: rowError } = await db
      .from("requests")
      .select("id, OrderComments")
      .eq("OrderNo", orderNo)
      .order("id", { ascending: true })
      .limit(1);

    if(rowError || !firstRow?.length) return;

    const existing = getOrderComments({ OrderComments: firstRow[0].OrderComments });
    existing.push({
      type: "system_action",
      action,
      by: actor,
      text,
      at: nowIso,
      meta
    });

    await db
      .from("requests")
      .update({ OrderComments: JSON.stringify(existing) })
      .eq("id", firstRow[0].id);
  }catch(err){
    console.warn("appendOrderActionLog failed", err);
  }
}

async function addOrderComment(orderNo){
  const input = document.getElementById("orderCommentInput");
  const fileInput = document.getElementById("commentAttachment");
  const text = (input?.value || "").trim();
  if(!text){
    return showPopup("Please enter comment ❗");
  }

  let attachmentUrl = "";
  let attachmentName = "";
  const file = fileInput?.files?.[0];
  if(file){
    attachmentName = file.name;
    attachmentUrl = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result || "");
      reader.onerror = () => resolve("");
      reader.readAsDataURL(file);
    });
  }

  const user = getUser();
  const allRowsForComments = await db
    .from("requests")
    .select("OrderComments")
    .eq("OrderNo", orderNo);

  let targetRow = null;
  const firstById = await db
    .from("requests")
    .select("id, OrderComments")
    .eq("OrderNo", orderNo)
    .order("id", { ascending: true })
    .limit(1);

  if(!firstById.error && firstById.data?.length){
    targetRow = {
      id: firstById.data[0].id,
      OrderComments: firstById.data[0].OrderComments
    };
  }else{
    const firstFallback = await db
      .from("requests")
      .select("OrderComments, created_at, PartNo")
      .eq("OrderNo", orderNo)
      .order("created_at", { ascending: true })
      .limit(1);
    if(firstFallback.data?.length){
      targetRow = {
        created_at: firstFallback.data[0].created_at,
        PartNo: firstFallback.data[0].PartNo,
        OrderComments: firstFallback.data[0].OrderComments
      };
    }
  }

  if(!targetRow){
    return showPopup("Failed to add comment ❌ (Order row not found)");
  }

    const existing = getOrderComments({ items: allRowsForComments.data || [], OrderComments: targetRow.OrderComments });
  existing.push({
    type: "user",
    by: user.Name || user.Role || "User",
    text,
    at: new Date().toISOString(),
    attachmentName,
    attachmentUrl
  });

  showLoader();
  let updateQuery = db
    .from("requests")
    .update({ OrderComments: JSON.stringify(existing) });

  if(targetRow.id !== undefined){
    updateQuery = updateQuery.eq("id", targetRow.id);
  }else{
    updateQuery = updateQuery
      .eq("OrderNo", orderNo)
      .eq("created_at", targetRow.created_at)
      .eq("PartNo", targetRow.PartNo);
  }

  const { error } = await updateQuery;
  hideLoader();

  if(error){
    return showPopup("Failed to add comment ❌ (Please ensure OrderComments column exists in requests table)");
  }
  const composer = document.getElementById("commentComposer");
  const postBtn = document.getElementById("postCommentBtn");
  composer?.classList.add("hidden");
  postBtn?.classList.add("hidden");
  showPopup("Comment added ✅");
  openOrderView(orderNo);

async function acceptEditedQty(orderNo){
  showLoader();
  const { data } = await db
    .from("requests")
    .select("id, OrderNo, PartNo, Branch, Qty, DNP, Value, editedqty")
    .eq("OrderNo", orderNo);

  const rows = data || [];
  if(rows.length){
    const prevDays = Number(window.prevQtyDays) || 30;
    const partNos = [...new Set(rows.map(r => normalizePartNo(r.PartNo)).filter(Boolean))];
    const prevQtyMap = {};

    if(partNos.length){
      const sinceDate = new Date();
      sinceDate.setDate(sinceDate.getDate() - prevDays);
      const { data: prevRows } = await db
        .from("requests")
        .select("PartNo, Qty, editedqty")
        .eq("Branch", rows[0].Branch)
        .in("PartNo", partNos)
        .neq("Status", "REJECTED")
        .neq("ApprovalStatus", "Rejected")
        .gte("created_at", sinceDate.toISOString())
        .neq("OrderNo", orderNo);

      (prevRows || []).forEach(pr => {
        const key = normalizePartNo(pr.PartNo);
        prevQtyMap[key] = (prevQtyMap[key] || 0) + getEffectiveQty(pr);
      });
    }

    for(const r of rows){
      const hasPersistedEdit = r.editedqty !== null && r.editedqty !== undefined && r.editedqty !== "";
      const prevQty = prevQtyMap[normalizePartNo(r.PartNo)] || 0;
      const originalQty = Number(r.Qty || 0);
      const targetEditedQty = hasPersistedEdit
        ? Math.max(0, Number(r.editedqty || 0))
        : Math.max(0, originalQty - prevQty);

      const baseValue = Number(r.Value || 0);
      const unitValue = originalQty > 0 ? (baseValue / originalQty) : Number(r.DNP || 0);
      const targetEditedValue = Number((unitValue * targetEditedQty).toFixed(2));

      await db
        .from("requests")
        .update({ editedqty: targetEditedQty, editedvalue: targetEditedValue })
        .eq("id", r.id);
    }
  }
  hideLoader();

  if(!window.superAcceptedEdits) window.superAcceptedEdits = {};
  window.superAcceptedEdits[orderNo] = true;
  await appendOrderActionLog(orderNo, "SUPER_ACCEPTED_EDITS", `Edited quantities accepted for approval by ${getUser()?.Name || "Unknown User"}.`);
  showPopup("Edited qty accepted for approval ✅");
  openOrderView(orderNo);
}

function escapeHtml(value){
  return (value ?? "")
    .toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getPrintableStatusLabel(status){
  const s = normalizeRowStatus(status);
  if(s === "PENDING APPROVAL") return "Pending Approval";
  if(s === "PARTIALLY DISPATCHED") return "Partially Dispatched";
  if(s === "NOT DESPATCHED") return "Not Dispatched";
  return s.charAt(0) + s.slice(1).toLowerCase();
}

  } else {
    loadTrack("track", true);
  }
}
    

function changePage(step){

  const newPage = CURRENT_PAGE + step;
  if(newPage < 1) return;

  CURRENT_PAGE = newPage;

  const user = getUser();
  const isAdmin = user.Role === "admin" || user.Branch === "HQ";
  const isSuper = isSuperLikeRole(user);

  if(isAdmin){
    loadAdmin(window.activeTab, true);
  }
  else if(isSuper){
    loadSuper(window.activeTab, true); // ✅ ADD THIS
  }
  else{
    loadTrack("track", true);
  }
}
    



    
    

async function downloadOrderExcel(orderNo){

  showLoader();

  const { data } = await db
    .from("requests")
    .select("*")
    .eq("OrderNo", orderNo);

  hideLoader();

  if(!data || !data.length){
    return showPopup("No data found ❗");
  }

  // FORMAT DATA FOR EXCEL
  const excelData = data.map(r => ({
    "Order No": r.OrderNo,
    "Branch": r.Branch,
    "Order Type": r.OrderType,
    "Order For": r.OrderFor,
    "Machine No": r.MachineNo,
    "Customer": r.CustomerName,
    "Part No": r.PartNo,
    "Description": r.Description,
    "Qty": getEffectiveQty(r),
    "Billed Qty": r.BilledQty || 0,
    "Pending Qty": getEffectiveQty(r) - (r.BilledQty || 0),
    "Value": getEffectiveValue(r),
    "Status": r.Status,
    "Processed Date": r.ProcessedDate || "",
    "Bill No": r.BillNo || "",
    "Transport": r.TransportName || "",
    "Docket": r.Docket || ""
  }));

  // CREATE SHEET
  const ws = XLSX.utils.json_to_sheet(excelData);

  // AUTO COLUMN WIDTH
  const colWidths = Object.keys(excelData[0]).map(key => ({
    wch: Math.max(key.length, 15)
  }));
  ws['!cols'] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Order");

  // DOWNLOAD
  XLSX.writeFile(wb, `Order_${orderNo}.xlsx`);
}

function getSortableCellValue(text){
  const raw = (text || "").trim();
  const numeric = Number(raw.replace(/[^0-9.-]/g, ""));
  if(raw && !Number.isNaN(numeric) && /[0-9]/.test(raw)){
    return { type: "number", value: numeric };
  }
  return { type: "string", value: raw.toLowerCase() };
}

document.addEventListener("click", function(evt){
  const th = evt.target.closest("th");
  if(!th || !th.closest("thead")) return;

  const table = th.closest("table");
  const tbody = table?.querySelector("tbody");
  if(!tbody) return;

  const headerRow = th.parentElement;
  const headers = Array.from(headerRow.children);
  const colIndex = headers.indexOf(th);
  if(colIndex < 0) return;

  const current = th.classList.contains("sort-asc") ? "asc"
    : th.classList.contains("sort-desc") ? "desc"
    : "";
  const next = current === "asc" ? "desc" : "asc";
  const headerKey = (th.innerText || "").replace(/[▲▼]/g, "").trim().toUpperCase();

  headers.forEach(h => h.classList.remove("sort-asc", "sort-desc"));
  th.classList.add(next === "asc" ? "sort-asc" : "sort-desc");

  if(table.classList.contains("track-table")){
    TABLE_SORT_STATE = { key: headerKey, dir: next };
    CURRENT_PAGE = 1;
    refreshCurrentView();
    return;
  }

  const rows = Array.from(tbody.querySelectorAll("tr"));
  rows.sort((a, b) => {
    const aText = a.children[colIndex]?.innerText || "";
    const bText = b.children[colIndex]?.innerText || "";
    const av = getSortableCellValue(aText);
    const bv = getSortableCellValue(bText);

    let result = 0;
    if(av.type === "number" && bv.type === "number"){
      result = av.value - bv.value;
    }else{
      result = av.value.localeCompare(bv.value);
    }
    return next === "asc" ? result : -result;
  });

  rows.forEach(r => tbody.appendChild(r));
});
