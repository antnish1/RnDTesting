  <meta http-equiv="Expires" content="0" />

  <title>Parts Connect Portal</title>
        <link rel="icon" type="image/png" href="F.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
</head>

<body class="min-h-screen w-full" style="background-color: var(--pc-bg); color: var(--pc-text);">

<div id="app" class="w-full"></div>

<!-- LOADER -->
<div id="loader" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background: rgba(15,23,32,0.72);">
  <div class="px-6 py-5 rounded-xl flex flex-col items-center gap-4" style="background: var(--pc-surface); border: 1px solid var(--pc-border);">
    <div class="w-10 h-10 border-4 border-t-transparent rounded-full animate-spin" style="border-color: var(--pc-primary); border-top-color: transparent;"></div>
    <p class="font-semibold" style="color: var(--pc-primary);">Processing...</p>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="hidden fixed inset-0 flex items-center justify-center z-50" role="dialog" aria-modal="true" aria-live="polite"
     style="background: rgba(15,23,32,0.65); backdrop-filter: blur(6px);">

  <div id="popupCard" class="w-[min(92vw,420px)] p-5 rounded-2xl shadow-2xl text-center space-y-3"
       style="background: linear-gradient(165deg, rgba(17,24,39,0.98), rgba(15,23,42,0.98)); border: 1px solid rgba(250,204,21,0.25); box-shadow: 0 26px 56px rgba(0,0,0,0.5);">

    <!-- ICON -->
    <div id="popupIcon" class="mx-auto w-12 h-12 flex items-center justify-center rounded-full text-xl"
         style="background: rgba(250,204,21,0.18); color: #facc15;">
      ✔️
    </div>

    <p id="popupTitle" class="text-sm font-extrabold tracking-wide uppercase" style="color:#fcd34d;">Notice</p>

    <!-- MESSAGE -->
    <p id="popupMsg" class="text-sm font-medium leading-relaxed"
       style="color: #e2e8f0;"></p>

    <!-- ACTIONS -->
    <div id="popupActions" class="mt-3 flex justify-center gap-3 flex-wrap"></div>

  </div>
</div>


    


<!-- ================= UPLOAD PROGRESS ================= -->
<div id="uploadProgress" class="hidden fixed bottom-6 right-6 z-50 w-[320px]">

  <div class="p-4 rounded-xl shadow-2xl"
       style="background: var(--pc-surface); border:1px solid var(--pc-border);">

    <div class="flex justify-between text-xs mb-2">
      <span id="progressText">Uploading...</span>
      <button onclick="cancelUpload()" class="text-red-500 font-bold">✕</button>
    </div>

    <!-- BAR -->
    <div class="w-full h-2 rounded bg-gray-200 overflow-hidden">
      <div id="progressBar"
           class="h-full"
           style="width:0%; background: linear-gradient(90deg, var(--pc-secondary), var(--pc-primary));">
      </div>
    </div>

    <!-- STATS -->
    <div class="text-xs mt-2 space-y-1" style="color: var(--pc-text-muted);">
      <div>Total: <span id="pTotal">0</span></div>
      <div>Uploaded: <span id="pSuccess">0</span></div>
      <div>Invalid: <span id="pFailed">0</span></div>
      <div>Remaining: <span id="pRemaining">0</span></div>
    </div>

  </div>
</div>

/* ================= TRACK TABLE STRONG HOVER ================= */

.track-table tbody tr {
  transition: all 0.25s ease;
  position: relative;
}

/* 🔥 STRONG HOVER (CLEARLY VISIBLE) */
.track-table tbody tr:hover {
  background: linear-gradient(
    135deg,
    rgba(37, 99, 235, 0.16),
    rgba(14, 165, 233, 0.12)
  ) !important;

  transform: translateY(-3px) scale(1.015);
  box-shadow: 0 12px 28px rgba(37,99,235,0.22);
  z-index: 5;
}

/* 🔥 CLICK EFFECT */
.track-table tbody tr:active {
  transform: scale(0.98);
}

/* 🔥 LEFT ACCENT BAR (VERY IMPORTANT FOR CLARITY) */
.track-table tbody tr:hover td:first-child {
  border-left: 5px solid var(--pc-secondary);
}

/* 🔥 OPTIONAL: TEXT EMPHASIS ON HOVER */
.track-table tbody tr:hover td {
  font-weight: 500;
}

.pc-section .absolute > h2 {

  if(lower.includes("upload cancelled")) return "Upload cancelled";

function normalizeUserKey(key){
  return (key || "").toString().trim().toLowerCase().replace(/[^a-z0-9]/g, "");
}

function getUserField(user, aliases = []){
  if(!user || typeof user !== "object") return "";

  const aliasSet = new Set(aliases.map(normalizeUserKey));
  const keys = Object.keys(user);

  for(const key of keys){
    if(aliasSet.has(normalizeUserKey(key))){
      return user[key];
    }
  }
  return "";
}

function normalizeUserPayload(user){
  if(!user || typeof user !== "object") return null;

  const normalized = {
    ...user,
    id: getUserField(user, ["id", "userid"]),
    Name: getUserField(user, ["name", "username", "employee"]),
    Branch: getUserField(user, ["branch", "branck", "branchname"]),
    Role: getUserField(user, ["role", "userrole"]),
    Password: getUserField(user, ["password", "pass"])
  };

  normalized.role = normalized.Role;
  normalized.branch = normalized.Branch;
  return normalized;
}

function getUser(){
  try {
    const rawUser = JSON.parse(localStorage.getItem("user"));
    return normalizeUserPayload(rawUser);
  }
  catch {
    return null;
  }
}

function getUserRole(user){
  const rawRole = getUserField(user, ["role", "userrole"]);
  return rawRole.toString().trim().toLowerCase();
}

function getUserBranch(user){
  const rawBranch = getUserField(user, ["branch", "branck", "branchname"]);
  return rawBranch.toString().trim();
}

function getUserName(user){
  return getUserField(user, ["name", "username", "employee"]).toString().trim();
}

function getUserId(user){
  return getUserField(user, ["id", "userid"]);
}

function isAdminRole(user){
  const role = getUserRole(user);
  const branch = getUserBranch(user);
  return role === "admin" || branch.toUpperCase() === "HQ";
}

function isSuperLikeRole(user){
  const role = getUserRole(user);
  return role === "super" || role === "manager";
}

function isManagerRole(user){
  return getUserRole(user) === "manager";
}

function isViewerRole(user){
  return getUserRole(user) === "viewer";
}

function isDeveloperRole(user){
  return getUserRole(user) === "developer";
}

async function syncUserRoleFromDb(user){
  if(!user) return null;

  const userId = getUserId(user);
  const userName = getUserName(user);
  const userBranch = getUserBranch(user);
  const baseQuery = db.from("users").select("id,Name,Branch,Role");
  let query = null;

  if(userId !== undefined && userId !== null && `${userId}` !== ""){
    query = baseQuery.eq("id", userId);
  }else if(userName){
    query = baseQuery.eq("Name", userName);
  }else if(userBranch){
    query = baseQuery.eq("Branch", userBranch);
  }else{
    return normalizeUserPayload(user);
  }

  const { data, error } = await query.maybeSingle();
  if(error){
    console.warn("Unable to refresh role from users table:", error.message || error);
    return user;
  }

  const latestRole = getUserField(data, ["role", "userrole"]);
  const latestBranch = getUserField(data, ["branch", "branck", "branchname"]);
  const latestName = getUserField(data, ["name", "username", "employee"]);
  if(latestRole || latestBranch || latestName){
    const nextUser = normalizeUserPayload({
      ...user,
      Role: latestRole || user.Role,
      role: latestRole || user.role,
      Branch: latestBranch || user.Branch,
      branch: latestBranch || user.branch,
      Name: latestName || user.Name,
      name: latestName || user.name
    });
    localStorage.setItem("user", JSON.stringify(nextUser));
    return nextUser;
  }
  return normalizeUserPayload(user);
}

const PART_USAGE_30D_CACHE = new Map();

function normalizePartNo(partNo){

async function getPartMasterByPartNo(partNo){
  const normalizedPartNo = normalizePartNo(partNo);
  if(!normalizedPartNo) return null;

  if(PART_MASTER_CACHE.has(normalizedPartNo)){
    return PART_MASTER_CACHE.get(normalizedPartNo);
  }

  const { data } = await db
    .from("part_master")
    .select("PartNo, Description, DNP, Cat1")
    .eq("PartNo", normalizedPartNo)
    .maybeSingle();

  PART_MASTER_CACHE.set(normalizedPartNo, data || null);
  return data || null;
}

async function getLast30QtyByBranchPart(branch, partNo){
  const normalizedPartNo = normalizePartNo(partNo);
  const key = `${branch || ""}__${normalizedPartNo}`;
  if(PART_USAGE_30D_CACHE.has(key)){
    return PART_USAGE_30D_CACHE.get(key);
  }

  const last30 = new Date();
  last30.setDate(last30.getDate() - 30);

  const { data: history } = await db
    .from("requests")
    .select("Qty, editedqty")
    .eq("Branch", branch)
    .eq("PartNo", normalizedPartNo)
    .neq("Status", "REJECTED")
    .neq("ApprovalStatus", "Rejected")
    .gte("created_at", last30.toISOString());

  let total30 = 0;
  (history || []).forEach(r => {
    total30 += getEffectiveQty(r);
  });

  PART_USAGE_30D_CACHE.set(key, total30);
  return total30;
}

  const docket = normalizeDocketNo(rawValue ?? inputEl?.value);
  const resultsEl = document.getElementById("docketScanResults");
  const countEl = document.getElementById("docketMatchCount");

    return;
  }

  if(resultsEl) resultsEl.innerHTML = `<div class="text-xs">Searching...</div>`;

  const { data, error } = await db
    .from("requests")
    .select("id,OrderNo,PartNo,Branch,CustomerName,Qty,Status,Docket,created_at")
    .ilike("Docket", docket)
    .order("created_at", { ascending: false })

async function markDocketRowReceived(rowId){
  const row = (window.docketScanMatches || []).find(x => String(x.id) === String(rowId));
  if(!row) return;

  const { error } = await db
    .from("requests")
    .update({
      Status: "RECEIVED",
      ProcessedDate: new Date().toISOString()
    })
    .eq("id", rowId);

  if(error){
    console.error(error);
    showPopup("Failed to mark as received.");
    return;
  }

  await appendOrderActionLog(
    row.OrderNo,
    "STATUS_UPDATED",
    `Row marked as RECEIVED via docket scanner by ${getUser()?.Name || "Unknown User"}.`,
    { status: "RECEIVED", docket: row.Docket || null }
  );

  window.docketScanMatches = (window.docketScanMatches || []).map(x =>
    String(x.id) === String(rowId) ? { ...x, Status: "RECEIVED" } : x
  );
  renderDocketMatches();
  showPopup("Marked as received ✅");
}

async function startDocketCameraScanner(){
  const view = document.getElementById("docketScannerView");
  const video = document.getElementById("docketScannerVideo");
  const hint = document.getElementById("docketScanHint");

  if(!view || !video) return;

  if(!navigator.mediaDevices?.getUserMedia){
    if(hint) hint.textContent = "Camera API unavailable on this browser. Use manual input.";
    return;
  }

  if(typeof window.BarcodeDetector === "undefined"){
    if(hint) hint.textContent = "Barcode scanning is not supported here. Use manual input.";
    return;
  }

  try{
    docketScannerDetector = docketScannerDetector || new BarcodeDetector({
      formats: ["qr_code", "code_128", "code_39", "ean_13", "ean_8", "upc_a", "upc_e", "itf"]
    });

    docketScannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    video.srcObject = docketScannerStream;
    await video.play();
    view.classList.remove("hidden");
    if(hint) hint.textContent = "Camera scanning started.";
    pollDocketBarcode();
  }catch(err){
    console.error(err);
    if(hint) hint.textContent = "Unable to start camera. Check permissions and retry.";
  }
}

function stopDocketCameraScanner(){
  const hint = document.getElementById("docketScanHint");
  if(docketScannerRaf){
    cancelAnimationFrame(docketScannerRaf);
    docketScannerRaf = null;
  }
  if(docketScannerStream){
    docketScannerStream.getTracks().forEach(t => t.stop());
    docketScannerStream = null;
  }
  const video = document.getElementById("docketScannerVideo");
  if(video){
    video.pause();
    video.srcObject = null;
  }
  if(hint) hint.textContent = "Camera stopped.";
}

async function pollDocketBarcode(){
  const video = document.getElementById("docketScannerVideo");
  if(!video || !docketScannerDetector || !docketScannerStream) return;

  if(!docketScannerBusy){
    docketScannerBusy = true;
    try{
      const barcodes = await docketScannerDetector.detect(video);
      if(barcodes?.length){
        const raw = barcodes[0]?.rawValue || "";
        const docket = normalizeDocketNo(raw);
        if(docket){
          const input = document.getElementById("docketScanInput");
          if(input) input.value = docket;
          await lookupDocketRows(docket);
        }
      }
    }catch(_){
      // silent loop for smoother scanning
    }finally{
      docketScannerBusy = false;
    }
  }

  docketScannerRaf = requestAnimationFrame(pollDocketBarcode);
}

async function submitOrder(){

const machineNo = document.getElementById("machineNo").value;
const customerName = document.getElementById("customerName").value;


const orderType = document.getElementById("orderType").value;
const orderFor = document.getElementById("orderFor").value;

const machineType = document.getElementById("machineType").value;

// BASIC REQUIRED
if(!orderType || !orderFor){
  return showPopup("Order Details are mandatory ❗");
}

// VOR RULE
if(orderType === "VOR"){
  if(!approvedBy || !machineNo || !customerName || !machineType){
    return showPopup("All fields mandatory for VOR ❗");
  }
}

// 🔥 APPROVER MUST BE SELECTED FOR ALL ORDERS
if(!approvedBy){
  return showPopup("Please select Approver ❗");
}
// SOP / ZSPL / ZMAC RULES
if(orderType === "SOP" || orderType === "ZSPL" || orderType === "ZMAC"){

  if(!orderFor){
    return showPopup("Order For required ❗");
  }

  if(orderFor === "Customer"){
    if(!machineNo || !machineType){
      return showPopup("Machine No & Type required ❗");
    }
  }
}
  
if(orderFor === "Customer" && (!machineNo || !customerName)){
  return showPopup("Fill machine & customer ❗");
}

const rows = document.querySelectorAll("#tbody tr");
let hasError = false;

const orderNo = "T" + Math.floor(1000000 + Math.random()*9000000);

const inserts = [];

for (const r of rows){

  if(hasError) return;

  const part = r.querySelector(".part").value.trim();
  const qty = r.querySelector(".qty").value.trim();
  const desc = r.querySelector(".desc").innerText;
  const dnp = Number(r.querySelector(".dnp").innerText)||0;

  if (part) {

    const qtyNum = Number(qty);

    // ❗ Qty validation
    if (!qty) {
      showPopup("Qty is required for all parts ❗");
      hasError = true;
      return;
    }

    if (qtyNum < 1) {
      showPopup("Qty cannot be less than 1 ❗", "error");
      hasError = true;
      return;
    }

    // ❗ PART VALIDATION (IMPORTANT)
    if (!desc || desc.trim() === "") {
      showPopup(`Invalid Part Number: ${part} ❗`, "error");
      hasError = true;
      return;
    }
  }

  if(!part) continue;

  const qtyLast30 = await getLast30QtyByBranchPart(getUserBranch(user), part);

  inserts.push({
    Branch: getUserBranch(user),

    OrderType: orderType,
    OrderFor: orderFor,

    EmployeeName: user.Name || "",
    ApprovedBy: approvedBy,
    WarrantyStatus: machineType,
    CallID: document.getElementById("callId").value || "",
    MachineNo: machineNo,
    CustomerName: customerName,

    PartNo: part,
    Qty: qty,
    ["30dQty"]: qtyLast30,
    Description: desc,
    DNP: dnp,
    Value: dnp * qty,

    OrderNo: orderNo,
    Status: "PENDING APPROVAL",
    ApprovalStatus: "PendingApproval"
  });

}

if(hasError){
  return;
}
if(!inserts.length){
  return showPopup("At least one Part Number is required ❗");
}

showLoader();

const { error } = await db.from("requests").insert(inserts);

hideLoader();

if(error) return showPopup("Submit failed");

await appendOrderActionLog(orderNo, "ORDER_CREATED", `Order placed by ${getUser()?.Name || "Unknown User"}.`);
showPopup("Submitted ✅ Order No: "+orderNo);

loadCreate();
}


// ---------- TRACK ----------
function applyTrackDateFilter(orders){
  if(!TRACK_FROM_DATE && !TRACK_TO_DATE) return orders;

  const fromDate = TRACK_FROM_DATE ? new Date(`${TRACK_FROM_DATE}T00:00:00`) : null;
  const toDate = TRACK_TO_DATE ? new Date(`${TRACK_TO_DATE}T23:59:59`) : null;

  return orders.filter(o => {
    const created = new Date(o.created_at);
    if(fromDate && created < fromDate) return false;
    if(toDate && created > toDate) return false;
    return true;
  });
}

function updateTrackDateFilter(kind, value){
  if(kind === "from") TRACK_FROM_DATE = value || "";
  if(kind === "to") TRACK_TO_DATE = value || "";
  loadTrack("track", true);
}

function setTrackStatusFilter(statusKey){
  TRACK_STATUS_FILTER = statusKey || "ALL";
  CURRENT_PAGE = 1;
  loadTrack("track", true);
}

async function loadPendingCount(){

  const { data, error } = await db
    .from("requests")
    .select("OrderNo, Status, ApprovalStatus");

  if(error) return;

  const grouped = {};
  (data || []).forEach(r => {
    if(!grouped[r.OrderNo]) grouped[r.OrderNo] = [];
    grouped[r.OrderNo].push(r);
  });

  // ✅ GET UNIQUE APPROVED ORDER COUNT
  const uniqueOrders = Object.entries(grouped)
    .filter(([, items]) => getOrderStatusLabel(items) === "APPROVED")
    .map(([orderNo]) => orderNo);
  const count = uniqueOrders.length;

  const el = document.getElementById("pendingCount");

  if(el){
    if(count > 0){
      el.innerText = count;
      el.classList.remove("hidden");
    } else {
      el.classList.add("hidden");
    }
  }
}

function formatDate(val){

  if(!val) return "-";

  // ✅ Case 1: ISO date (ProcessedDate)
  if(val.includes("T")){
    const d = new Date(val);
    return d.toLocaleDateString("en-GB"); // dd/mm/yyyy
  }

  // ✅ Case 2: Excel number (OrderRegDt, BillingDt)
  if(!isNaN(val)){
    const excelDate = new Date((val - 25569) * 86400 * 1000);
    return excelDate.toLocaleDateString("en-GB");
  }

  return val;
}

function formatDateTime(val){
  if(!val) return "-";

  const d = new Date(val);

  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = String(d.getFullYear()).slice(-2);

  // 🔥 12-HOUR FORMAT LOGIC
  let hours = d.getHours();
  const ampm = hours >= 12 ? 'PM' : 'AM';

  hours = hours % 12 || 12; // convert 0 → 12
  hours = String(hours).padStart(2, '0');

  const mins = String(d.getMinutes()).padStart(2, '0');

  return `${day}-${month}-${year} ${hours}:${mins} ${ampm}`;
}

function getUploadReportMeta(){
  try{
    const raw = localStorage.getItem("uploadReportMeta");
    const parsed = raw ? JSON.parse(raw) : {};
    return parsed && typeof parsed === "object" ? parsed : {};
  }catch(_){
    return {};
  }
}

function setUploadReportMeta(type, whenISO = new Date().toISOString()){
  const prev = getUploadReportMeta();
  const next = { ...prev, [type]: whenISO };
  localStorage.setItem("uploadReportMeta", JSON.stringify(next));
}

  });
}

function getEffectiveQty(row){
  const edited = row?.editedqty ?? row?.EditedQty;
  if(edited === null || edited === undefined || edited === ""){
    return Number(row?.Qty || 0);
  }
  return Number(edited || 0);
}

function getEffectiveValue(row){
  const edited = row?.editedvalue ?? row?.EditedValue;
  if(edited === null || edited === undefined || edited === ""){
    return Number(row?.Value || 0);
  }
  return Number(edited || 0);
}

function normalizeRowStatus(status){
  const s = (status || "").toString().trim().toUpperCase();

  if(s.includes("DESPATCHED") || s.includes("DISPATCHED")){
    return s.includes("NOT") ? "NOT DESPATCHED" : "DISPATCHED";
  }
  if(s.includes("REJECT")) return "REJECTED";
  if(s.includes("PROCESS")) return "PROCESSED";
  if(s.includes("PENDING APPROVAL") || s.includes("APPROVAL PENDING") || s === "PENDINGAPPROVAL"){
    return "PENDING APPROVAL";
  }
  if(s.includes("PEND")) return "APPROVED";

  return s || "PENDING APPROVAL";
}

function getOrderStatusLabel(order){
  const items = Array.isArray(order?.items) ? order.items : (Array.isArray(order) ? order : []);
  if(!items.length) return "PENDING APPROVAL";

  const statuses = items.map(x => normalizeRowStatus(x?.Status));
  const hasRejected = items.some(x => {
    const approval = (x?.ApprovalStatus || "").toString().trim().toUpperCase();
    return normalizeRowStatus(x?.Status) === "REJECTED" || approval === "REJECTED";
  });
  const hasPendingApproval = items.some(x =>
    normalizeRowStatus(x?.Status) === "PENDING APPROVAL" || isPendingApprovalStatus(x?.ApprovalStatus)
  );

  if(hasRejected) return "REJECTED";
  if(statuses.every(s => s === "DISPATCHED")) return "DISPATCHED";
  if(statuses.includes("DISPATCHED")) return "PARTIALLY DISPATCHED";
  if(statuses.every(s => s === "NOT DESPATCHED")) return "NOT DESPATCHED";
  if(statuses.every(s => s === "PROCESSED")) return "PROCESSED";
  if(statuses.every(s => s === "PENDING APPROVAL") || hasPendingApproval) return "PENDING APPROVAL";
  if(statuses.some(s => s === "APPROVED")) return "APPROVED";

  return statuses[0] || "PENDING APPROVAL";
}

function getStatusChipStyle(status){
  const s = normalizeRowStatus(status);
  const palette = {
    "PENDING APPROVAL": { bg:"rgba(59,130,246,0.2)", text:"#dbeafe", border:"rgba(96,165,250,0.45)" },
    "APPROVED": { bg:"rgba(16,185,129,0.16)", text:"#d1fae5", border:"rgba(16,185,129,0.42)" },
    "PROCESSED": { bg:"rgba(245,158,11,0.18)", text:"#fef3c7", border:"rgba(245,158,11,0.46)" },
    "DISPATCHED": { bg:"rgba(34,197,94,0.18)", text:"#dcfce7", border:"rgba(34,197,94,0.44)" },
    "PARTIALLY DISPATCHED": { bg:"rgba(217,119,6,0.22)", text:"#ffedd5", border:"rgba(251,191,36,0.45)" },
    "NOT DESPATCHED": { bg:"rgba(71,85,105,0.35)", text:"#e2e8f0", border:"rgba(148,163,184,0.45)" },
    "REJECTED": { bg:"rgba(239,68,68,0.18)", text:"#fecaca", border:"rgba(239,68,68,0.4)" }
  };
  const p = palette[s] || { bg:"rgba(148,163,184,0.2)", text:"#e2e8f0", border:"rgba(148,163,184,0.4)" };
  return `background:${p.bg}; color:${p.text}; border:1px solid ${p.border}; white-space:nowrap; display:inline-flex; align-items:center; line-height:1.05;`;
}

function getOrderTypeRowStyle(orderType){
  const type = (orderType || "").toString().trim().toUpperCase();
  if(type === "VOR"){
    return "background: linear-gradient(90deg, rgba(245,158,11,0.22), rgba(245,158,11,0.06)); border-left: 4px solid #f59e0b;";
  }
  return "background: rgba(15,23,42,0.5); border-left: 4px solid transparent;";
}

function applyOrderSort(orders){
  if(!TABLE_SORT_STATE?.key || !TABLE_SORT_STATE?.dir) return orders;
  const key = TABLE_SORT_STATE.key;
  const dir = TABLE_SORT_STATE.dir === "asc" ? 1 : -1;
  const sorted = [...orders];

  sorted.sort((a, b) => {
    const qtyA = (a.items || []).reduce((s,x)=>s+getEffectiveQty(x),0);
    const qtyB = (b.items || []).reduce((s,x)=>s+getEffectiveQty(x),0);
    const valA = (a.items || []).reduce((s,x)=>s+getEffectiveValue(x),0);
    const valB = (b.items || []).reduce((s,x)=>s+getEffectiveValue(x),0);

    const map = {
      "DATE": [new Date(a.created_at).getTime() || 0, new Date(b.created_at).getTime() || 0],
      "ORDER TYPE": [(a.OrderType || "").toLowerCase(), (b.OrderType || "").toLowerCase()],
      "ORDER FOR": [((a.OrderFor === "Customer" ? a.CustomerName : "Stock") || "").toLowerCase(), ((b.OrderFor === "Customer" ? b.CustomerName : "Stock") || "").toLowerCase()],
      "CUSTOMER": [((a.CustomerName || "Stock") || "").toLowerCase(), ((b.CustomerName || "Stock") || "").toLowerCase()],
      "BRANCH": [(a.Branch || "").toLowerCase(), (b.Branch || "").toLowerCase()],
      "QTY": [qtyA, qtyB],
      "VALUE": [valA, valB],
      "ORDER NO": [(a.OrderNo || "").toLowerCase(), (b.OrderNo || "").toLowerCase()],
      "STATUS": [getOrderStatusLabel(a).toLowerCase(), getOrderStatusLabel(b).toLowerCase()]
    };

    const pair = map[key] || [new Date(a.created_at).getTime() || 0, new Date(b.created_at).getTime() || 0];
    if(typeof pair[0] === "number" && typeof pair[1] === "number"){
      return (pair[0] - pair[1]) * dir;
    }
    return pair[0].localeCompare(pair[1]) * dir;
  });

  return sorted;
}

function isPendingApprovalStatus(val){
  const s = (val || "").toString().trim().toUpperCase();
  return s === "PENDINGAPPROVAL" ||
    s === "PENDING APPROVAL" ||
    s === "APPROVAL PENDING" ||
    s === "PENDINGMANAGERAPPROVAL" ||
    s === "PENDING MANAGER APPROVAL";
}

function parseOrderComments(raw){
  if(!raw) return [];
  try{
    const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
    return Array.isArray(parsed) ? parsed : [];
  }catch{
    return [];
  }
}

function isSystemActionComment(comment){
  return (comment?.type || "").toString().trim().toLowerCase() === "system_action";
}

function getOrderComments(orderObj){
  const uniqueComments = (items) => {
    const seen = new Set();
    return items.filter(c => {
      const key = [
        c?.by || "",
        c?.text || "",
        c?.at || "",
        c?.attachmentName || "",
        c?.attachmentUrl || ""
      ].join("|");
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  };

  if(Array.isArray(orderObj?.items)){
    for(const row of orderObj.items){
      const parsed = parseOrderComments(row?.OrderComments);
      if(parsed.length) return uniqueComments(parsed);
    }
  }
  return uniqueComments(parseOrderComments(orderObj?.OrderComments));
}

function getUserComments(orderObj){
  return getOrderComments(orderObj).filter(c => !isSystemActionComment(c));
}

function getOrderCommentCount(orderObj){
  return getUserComments(orderObj).length;
}

function shouldShowOrder(orderObj){
  const items = Array.isArray(orderObj?.items) ? orderObj.items : [];
  const totalQty = items.reduce((sum, x) => sum + getEffectiveQty(x), 0);
  const totalValue = items.reduce((sum, x) => sum + getEffectiveValue(x), 0);
  return !(totalQty === 0 && totalValue === 0);
}

function getCommentUserBg(by){
  const palettes = ["#fef3c7", "#dbeafe", "#dcfce7", "#fce7f3", "#ede9fe", "#e0f2fe", "#f1f5f9"];
  const name = (by || "").toString();
  let hash = 0;
  for(let i = 0; i < name.length; i++){
    hash = (hash + name.charCodeAt(i)) % palettes.length;
  }
  return palettes[hash];
}

function formatDateTimeIST(dateValue){
  if(!dateValue) return "-";
  const date = new Date(dateValue);
  if(Number.isNaN(date.getTime())) return "-";
  return new Intl.DateTimeFormat("en-IN", {
    timeZone: "Asia/Kolkata",
    year: "numeric",
    month: "short",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  }).format(date);
}

const commentAttachmentHrefCache = {};
function getCommentAttachmentHref(url){
  if(!url) return "";
  if(!url.startsWith("data:")) return url;
  if(commentAttachmentHrefCache[url]) return commentAttachmentHrefCache[url];
  try{
    const [meta, base64] = url.split(",");
    const mime = (meta.match(/data:(.*?);base64/) || [])[1] || "application/octet-stream";
    const binary = atob(base64 || "");
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for(let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
    const blobUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));
    commentAttachmentHrefCache[url] = blobUrl;
    return blobUrl;
  }catch{
    return url;
  }
}

async function processOrder(orderNo){

  const inputOrderNo = document.getElementById("processOrderNo").value.trim();

  if(!inputOrderNo){
    return showPopup("Enter Order No ❗");
  }

  // ✅ SAME ORDER CHECK
  if(inputOrderNo === orderNo){
    return showPopup("Already same Order No ❗");
  }

  // ✅ 🔥 ADD THIS BLOCK HERE
  const { data: existing } = await db
    .from("requests")
    .select("OrderNo")
    .eq("OrderNo", inputOrderNo);

  if(existing && existing.length > 0){
    return showPopup("Order No already exists ❗");
  }

  // ⬇️ THIS WAS ALREADY THERE
  showLoader();

  const { error } = await db
    .from("requests")
    .update({ 
      OrderNo: inputOrderNo,
      Status: "Processed"
    })
    .eq("OrderNo", orderNo);

  hideLoader();

  if(error){
    console.error(error);
      
    return showPopup("Error updating Order ❗");
  }

  await appendOrderActionLog(inputOrderNo, "ADMIN_PROCESSED", `Order marked as Processed by ${getUser()?.Name || "Unknown User"}.`);
  showPopup("Order Updated & Processed ✅");
  if(isDeveloperRole(getUser())){
    loadDeveloperDashboard();
  } else {
    loadAdmin("Processed");
  }
}

async function processExcelData(rows){

  showLoader();

  let updated = 0;
  let inserted = 0;
  let skipped = 0;
  const statusLoggedOrders = new Set();
  let requestIdSeed = null;

  const getUploadCellValueLocal = (row, aliases = []) => {
    const normalizedEntries = Object.entries(row || {}).map(([key, value]) => ({
      key: (key || "").toString().trim().toLowerCase().replace(/\s+/g, " "),
      value
    }));
    for(const alias of aliases){
      const hit = normalizedEntries.find(entry => entry.key === (alias || "").toString().trim().toLowerCase().replace(/\s+/g, " "));
      if(hit) return hit.value;
    }
    return "";
  };
  const normalizeCompareLocal = (value) => (value || "").toString().trim().toUpperCase().replace(/\s+/g, " ");
  const isReceivedLockedStatus = (statusValue) => normalizeCompareLocal(statusValue).includes("RECEIVED");
  const allocateRequestId = async () => {
    if(requestIdSeed === null){
      const { data: latestIdRows } = await db
        .from("requests")
        .select("id")
        .order("id", { ascending: false })
        .limit(1);
      requestIdSeed = Number(latestIdRows?.[0]?.id || 0);
    }
    requestIdSeed += 1;
    return requestIdSeed;
  };

  for(const r of rows){
    console.log("🟡 RAW EXCEL ROW:", r);
    const orderNo = r["Order No"]?.toString().trim().toUpperCase();
    const partNo = r["Material No"]?.toString().trim().toUpperCase();
    const branchName = (getUploadCellValueLocal(r, ["branch", "branch name", "plant", "location", "branch_name"]) || "").toString().trim();
    console.log("📦 Excel OrderNo:", orderNo);
    console.log("🔩 Excel PartNo:", partNo);
    
    const status = r["Status"]?.toString().trim();
    const normalizeBillingDateValue = (value) => {
      if(value === null || value === undefined) return null;
      const raw = value.toString().trim();
      if(!raw) return null;
      if(/^\d+(\.\d+)?$/.test(raw)){
        const serial = Math.floor(Number(raw));
        if(!Number.isFinite(serial)) return null;
        try{
          const base = new Date(Date.UTC(1899, 11, 30));
          base.setUTCDate(base.getUTCDate() + serial);
          if(Number.isNaN(base.getTime())) return null;
          const year = base.getUTCFullYear();
          if(year < 1900 || year > 2100) return null;
          return base.toISOString().slice(0, 10);
        }catch{
          return null;
        }
      }
      const normalized = raw.replace(/\//g, "-");
      if(/^\d{2}-\d{2}-\d{4}$/.test(normalized)){
        const [dd, mm, yyyy] = normalized.split("-");
        const candidate = new Date(`${yyyy}-${mm}-${dd}T00:00:00Z`);
        if(Number.isNaN(candidate.getTime())) return null;
        return `${yyyy}-${mm}-${dd}`;
      }
      if(/^\d{4}-\d{2}-\d{2}/.test(normalized)){
        const candidate = new Date(`${normalized.slice(0, 10)}T00:00:00Z`);
        if(Number.isNaN(candidate.getTime())) return null;
        return normalized.slice(0, 10);
      }
      return null;
    };

    // ❗ SKIP INVALID ROWS
    if(!orderNo || !partNo){
      skipped++;
      continue;
    }

    const normalizedPartNo = partNo.replace(/\s/g,"").toUpperCase();
    const billedQty = Number(r["Billed Qty"] || 0);
    const billingDt = normalizeBillingDateValue(r["Billing Dt"]);
    const deliveryNo = (r["Delivery No"] || "").toString().trim();
    const billNo = (r["BillNo & Image"] || "").toString().trim();
    const docketNo = (r["Docket"] || "").toString().trim();
    const transportName = (r["Transport Name"] || "").toString().trim();

    // 🔍 CHECK IF MATCH EXISTS FIRST (SAFE UPDATE) using OrderNo + PartNo
    let existing = null;
    if(orderNo){
      const { data: matchesByOrder } = await db
        .from("requests")
        .select("*")
        .eq("OrderNo", orderNo)
        .eq("PartNo", normalizedPartNo)
        .order("created_at", { ascending: false })
        .limit(1);
      if(matchesByOrder?.length){
        existing = matchesByOrder[0];
      }
    }
    if(!existing){
      const { data: fallbackByBranch } = await db
        .from("requests")
        .select("*")
        .eq("PartNo", normalizedPartNo)
        .order("created_at", { ascending: false });
      const branchMatched = (fallbackByBranch || []).find(x =>
        normalizeCompareLocal(x.Branch || "") === normalizeCompareLocal(branchName || "")
      );
      if(branchMatched){
        existing = branchMatched;
      }
    }
    console.log("🧾 DB MATCH RESULT:", existing);
    if(!existing){
      console.log("❌ NO MATCH FOUND");
      console.log("Excel:", orderNo, partNo, branchName);
      skipped++;
      continue;
    } else {
      console.log("✅ MATCH FOUND");
      console.log("DB Row:", existing);
    }

    if(isReceivedLockedStatus(existing.Status)){
      console.log("⏭️ SKIPPED: Existing row already in final RECEIVED status.");
      skipped++;
      continue;
    }

    const existingBillNo = (existing.BillNo || "").toString().trim();
    const existingDocket = (existing.Docket || "").toString().trim();
    const existingTransport = (existing.TransportName || "").toString().trim();
    const hasExistingBill = !!existingBillNo;
    const hasExistingDocket = !!existingDocket;
    const hasExistingTransport = !!existingTransport;
    const hasMismatchOnExistingFilledFields =
      (hasExistingBill && normalizeCompareLocal(existingBillNo) !== normalizeCompareLocal(billNo)) ||
      (hasExistingDocket && normalizeCompareLocal(existingDocket) !== normalizeCompareLocal(docketNo)) ||
      (hasExistingTransport && normalizeCompareLocal(existingTransport) !== normalizeCompareLocal(transportName));

    const normalizedUploadStatus = normalizeRowStatus(status || "");
    const allowedLifecycleStatuses = ["PENDING APPROVAL", "APPROVED", "PROCESSED", "NOT DISPATCHED", "DISPATCHED"];
    var resolvedDispatchStatus = "PROCESSED";
    if(allowedLifecycleStatuses.includes(normalizedUploadStatus)){
      resolvedDispatchStatus = normalizedUploadStatus;
    }

    if(hasMismatchOnExistingFilledFields){
      const nextRequestId = await allocateRequestId();
      const insertPayload = {
        ...existing,
        id: nextRequestId,
        Status: resolvedDispatchStatus,
        ProcessedDate: new Date().toISOString(),
        OrderRegDt: r["Order Reg. Dt"] || "",
        DeliveryNo: deliveryNo || "",
        BillNo: billNo || "",
        BillingDt: r["Billing Dt"] || "",
        BilledQty: billedQty,
        TransportName: transportName || "",
        TransportMode: (r["Transport Mode"] || "").toString().trim(),
        Docket: docketNo || "",
        PackingDetail: (r["Packing Detail"] || "").toString().trim(),
        EWayBillNo: (r["E-Way Bill No"] || "").toString().trim(),
        GSTInvoiceNo: (r["GST Invoice No."] || "").toString().trim()
      };
      delete insertPayload.created_at;
      delete insertPayload.updated_at;

      const { error: insertError } = await db
        .from("requests")
        .insert([insertPayload])
        .select("id,OrderNo")
        .limit(1);

      if(insertError){
        console.error(insertError);
        skipped++;
        continue;
      }
      inserted++;
      if(!statusLoggedOrders.has(orderNo)){
        await appendOrderActionLog(
          orderNo,
          "STATUS_UPDATED",
          `New request row inserted from upload due Bill/Docket/Transport mismatch by ${getUser()?.Name || "Unknown User"}.`,
          { status: resolvedDispatchStatus, mode: "insert_on_mismatch" }
        );
        statusLoggedOrders.add(orderNo);
      }
      continue;
    }

    const idempotencyKey = [
      String(existing.id),
      orderNo,
      normalizedPartNo,
      billedQty.toString(),
      billingDt || "",
      deliveryNo.toUpperCase(),
      billNo.toUpperCase()
    ].join("|");

    const chunkPayload = {
      request_row_id: String(existing.id),
      order_no: orderNo,
      part_no: normalizedPartNo,
      billed_qty: billedQty,
      billing_dt: billingDt,
      delivery_no: deliveryNo || null,
      bill_no: billNo || null,
      docket: docketNo || null,
      transport_name: transportName || null,
      transport_mode: (r["Transport Mode"] || "").toString().trim() || null,
      packing_detail: (r["Packing Detail"] || "").toString().trim() || null,
      eway_bill_no: (r["E-Way Bill No"] || "").toString().trim() || null,
      gst_invoice_no: (r["GST Invoice No."] || "").toString().trim() || null,
      status: status || "Processed",
      processed_date: new Date().toISOString(),
      idempotency_key: idempotencyKey,
      source: "status_report_upload"
    };

    const { error: chunkError } = await db
      .from("request_billings")
      .upsert([chunkPayload], { onConflict: "idempotency_key" });

    if(chunkError){
      console.error(chunkError);
      skipped++;
      continue;
    }

    const { data: billingRows, error: sumError } = await db
      .from("request_billings")
      .select("billed_qty")
      .eq("request_row_id", String(existing.id));

    if(sumError){
      console.error(sumError);
      skipped++;
      continue;
    }

    const billedQtyTotal = (billingRows || []).reduce((sum, row) => sum + Number(row.billed_qty || 0), 0);
    const orderedQty = Number(existing.Qty || 0);
    const pendingQty = Math.max(orderedQty - billedQtyTotal, 0);
    resolvedDispatchStatus = pendingQty > 0 ? "NOT DISPATCHED" : "DISPATCHED";
    if(allowedLifecycleStatuses.includes(normalizedUploadStatus)){
      resolvedDispatchStatus = normalizedUploadStatus;
    }
    if(pendingQty > 0 && resolvedDispatchStatus === "DISPATCHED"){
      resolvedDispatchStatus = "NOT DISPATCHED";
    }
    if(pendingQty <= 0 && resolvedDispatchStatus === "NOT DISPATCHED"){
      resolvedDispatchStatus = "DISPATCHED";
    }

    const { error } = await db
      .from("requests")
      .update({
        Status: resolvedDispatchStatus,
        ProcessedDate: new Date().toISOString(),
        OrderRegDt: r["Order Reg. Dt"] || "",
        DeliveryNo: deliveryNo || "",
        BillNo: billNo || "",
        BillingDt: r["Billing Dt"] || "",
        BilledQty: billedQty,
        billed_qty_total: billedQtyTotal,
        pending_qty: pendingQty,
        dispatch_status: resolvedDispatchStatus,
        TransportName: transportName || "",
        TransportMode: r["Transport Mode"] || "",
        Docket: docketNo || "",
        PackingDetail: r["Packing Detail"] || "",
        EWayBillNo: r["E-Way Bill No"] || "",
        GSTInvoiceNo: r["GST Invoice No."] || ""
      })
      .eq("id", existing.id);

    if(!error){
      updated++;
      if(!statusLoggedOrders.has(orderNo)){
        await appendOrderActionLog(
          orderNo,
          "STATUS_UPDATED",
          `Status updated to ${resolvedDispatchStatus} via upload by ${getUser()?.Name || "Unknown User"}.`,
          { status: resolvedDispatchStatus, billed_qty_total: billedQtyTotal, pending_qty: pendingQty }
        );
        statusLoggedOrders.add(orderNo);
      }
    } else {
      console.error(error);
      skipped++;
    }
  }

  hideLoader();

  setUploadReportMeta("statusReport");
  showPopup(`Upload Complete ✅\nUpdated: ${updated}\nInserted: ${inserted}\nSkipped: ${skipped}`);

  loadAdmin(window.activeTab);
}

function normalizeInventoryHeaderKey(key){
  return (key || "").toString().replace(/\n/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
}

function getInventoryValue(row, aliases){
  const entries = Object.entries(row || {});
  const keyMap = new Map(entries.map(([k]) => [normalizeInventoryHeaderKey(k), k]));
  for(const alias of aliases){
    const hit = keyMap.get(normalizeInventoryHeaderKey(alias));
    if(hit !== undefined) return row[hit];
  }
  return "";
}

function parseInventoryNumber(v){
  if(v === null || v === undefined || v === "") return 0;
  const n = Number(String(v).replace(/,/g, "").trim());
  return Number.isFinite(n) ? n : 0;
}

function setInventoryProgress(percent, message){

async function insertInventoryStagingInBatches(rows, batchSize = 500){
  let uploaded = 0;
  let failed = 0;
  const errorSamples = [];

  for(let i=0; i<rows.length; i += batchSize){
    const chunk = rows.slice(i, i + batchSize);
    const { error } = await db
      .from("inventory_staging")
      .upsert(chunk, { onConflict: "report_date,branch_code,item_code" });

    if(!error){
      uploaded += chunk.length;
    }else{
      // Fallback to row-wise upsert to count failures precisely.
      for(const row of chunk){
        const { error: rowError } = await db
          .from("inventory_staging")
          .upsert([row], { onConflict: "report_date,branch_code,item_code" });
        if(rowError){
          failed++;
          if(errorSamples.length < 5){
            errorSamples.push(rowError.message || "Unknown row error");
          }
        }else{
          uploaded++;
        }
      }
    }

    const done = Math.min(rows.length, i + chunk.length);
    const pct = 10 + Math.round((done / rows.length) * 88);
    setInventoryProgress(pct, `Uploading inventory rows... ${done}/${rows.length}`);
  }

  return { uploaded, failed, errorSamples };
}

async function applyInventoryThreeTableFlow(stagingRows, reportDate){
  const uniq = new Map();
  stagingRows.forEach(r => {
    const key = `${r.branch_code || ""}__${r.item_code || ""}`;
    if(!r.branch_code || !r.item_code) return;
    uniq.set(key, r);
  });
  const uniqueRows = [...uniq.values()];
  if(!uniqueRows.length) return { upserted: 0, changed: 0 };

  const changesPayload = [];
  let upsertedCount = 0;

  for(const r of uniqueRows){
    const payload = {
      report_date: reportDate,
      branch_code: r.branch_code,
      item_code: r.item_code,
      item_name: r.item_name,
      item_group: r.item_group,
      uom: r.uom,
      dnp: r.dnp,
      qty: Number(r.qty || 0),
      inv_value: Number(r.inv_value || 0)
    };

    const { data: existingRow, error: readError } = await db
      .from("inventory_current")
      .select("qty")
      .eq("branch_code", r.branch_code)
      .eq("item_code", r.item_code)
      .maybeSingle();
    if(readError) throw readError;

    const prevQty = Number(existingRow?.qty || 0);
    const newQty = Number(r.qty || 0);
    if(prevQty !== newQty){
      changesPayload.push({
        report_date: reportDate,
        branch_code: r.branch_code,
        item_code: r.item_code,
        prev_qty: prevQty,
        new_qty: newQty,
        delta_qty: newQty - prevQty
      });
    }

    if(existingRow){
      const { error: updateError } = await db
        .from("inventory_current")
        .update(payload)
        .eq("branch_code", r.branch_code)
        .eq("item_code", r.item_code);
      if(updateError) throw updateError;
    } else {
      const { error: insertError } = await db
        .from("inventory_current")
        .insert(payload);
      if(insertError) throw insertError;
    }
    upsertedCount++;
  }

  if(changesPayload.length){
    const { error: changesError } = await db
      .from("inventory_changes")
      .insert(changesPayload);
    if(changesError) throw changesError;
  }

  return { upserted: upsertedCount, changed: changesPayload.length };
}

async function processInventoryExcelData(rows, reportDate){
  if(!Array.isArray(rows) || !rows.length){
    showPopup("No inventory rows found in file.");
    return;
  }

  showLoader();
  try{
    const payload = [];
    let failed = 0;
    const normalizeBranchKey = (val) => (val || "").toString().trim().toUpperCase().replace(/\s+/g, " ");
    const branchCodeByName = new Map();
    const { data: branchMappings } = await db
      .from("branch_mapping")
      .select("*");
    (branchMappings || []).forEach(m => {
      const nameKey = normalizeBranchKey(getUserField(m, ["branchname", "branch_name"]));
      const codeVal = (getUserField(m, ["branchcode", "branch_code"]) || "").toString().trim().toUpperCase();
      if(nameKey && codeVal && !branchCodeByName.has(nameKey)){
        branchCodeByName.set(nameKey, codeVal);
      }
    });

    for(const row of rows){
      const branch = String(getInventoryValue(row, ["Branch"])).trim();
      const brCode = String(getInventoryValue(row, ["Br. Code", "Br Code"])).trim();
      const itemCode = String(getInventoryValue(row, ["Itemcode", "Item Code"])).trim();
      const itemName = String(getInventoryValue(row, ["ItemName", "Item Name"])).trim();
      const itemGroup = String(getInventoryValue(row, ["Item Group"])).trim();
      const bhlhln = String(getInventoryValue(row, ["BHLHLN"])).trim();
      const rec = String(getInventoryValue(row, ["REC"])).trim();
      const nsp = String(getInventoryValue(row, ["NSP"])).trim();
      const uom = String(getInventoryValue(row, ["UOM"])).trim();
      const dnp = parseInventoryNumber(getInventoryValue(row, ["DNP"]));
      const openingBalance = parseInventoryNumber(getInventoryValue(row, ["Opening Balance"]));
      const openingInvVal = parseInventoryNumber(getInventoryValue(row, ["Opening Inv Val"]));
      const received = parseInventoryNumber(getInventoryValue(row, ["Received"]));
      const issued = parseInventoryNumber(getInventoryValue(row, ["Issued"]));
      const closingBalance = parseInventoryNumber(getInventoryValue(row, ["Closing Balance"]));
      const closingInvVal = parseInventoryNumber(getInventoryValue(row, ["Closing Inv Val"]));

      // Skip grand-total/footer rows and empty rows
      if(/^grand total$/i.test(branch) || /^grand total$/i.test(itemCode) || (!itemCode && !itemName)){
        failed++;
        continue;
      }

      const mappedBranchCode = branchCodeByName.get(normalizeBranchKey(branch)) || "";
      const resolvedBranchCode = (brCode || mappedBranchCode || bhlhln || "").toUpperCase().trim();
      if(!resolvedBranchCode || !itemCode){
        failed++;
        continue;
      }

      payload.push({
        report_date: reportDate,
        item_code: itemCode.toUpperCase(),
        item_name: itemName || null,
        item_group: itemGroup || null,
        branch_code: resolvedBranchCode,
        rec_flag: rec || null,
        nsp_flag: nsp || null,
        uom: uom || null,
        dnp: dnp,
        opening_balance: openingBalance,
        opening_inv_val: openingInvVal,
        received_qty: received,
        issued_qty: issued,
        qty: closingBalance,
        inv_value: closingInvVal
      });
    }

    if(!payload.length){
      showPopup("No valid inventory data found after filtering totals/blank rows.");
      return;
    }

    // Keep last occurrence in the same file for same unique key.
    const dedupeMap = new Map();
    for(const row of payload){
      const key = `${row.report_date}__${row.branch_code || ""}__${row.item_code || ""}`;
      if(dedupeMap.has(key)) failed++;
      dedupeMap.set(key, row); // keep latest row from file
    }
    const finalPayload = [...dedupeMap.values()];

    setInventoryProgress(5, `Prepared ${finalPayload.length} rows for staging upload...`);
    const uploadStats = await insertInventoryStagingInBatches(finalPayload, 500);
    failed += uploadStats.failed;

    setInventoryProgress(100, "Inventory upload completed.");

    setUploadReportMeta("inventoryReport");
    showPopup(
      `Inventory Upload Complete ✅\nUploaded: ${uploadStats.uploaded}\nFailed: ${failed}${uploadStats.errorSamples.length ? `\nErrors:\n- ${uploadStats.errorSamples.join("\n- ")}` : ""}`
    );
  } catch(err){
    console.error("Inventory upload failed:", err);
    const errorText = [err?.message, err?.details, err?.hint].filter(Boolean).join("\n");
    showPopup(`Inventory upload failed ❌\n${errorText || "Unknown error"}`);
  } finally {
    setTimeout(hideInventoryProgress, 1200);
    hideLoader();
  }
}




async function processPartsUploadFlexible(rows){

  cancelUploadFlag = false;

  showLoader();

  let success = 0;
  let failed = 0;

  // ✅ MERGE DUPLICATES
  const merged = {};

  rows.forEach(r=>{
    const part = r[0]?.toString().trim().toUpperCase();
    const qty = Number(r[1]);

    if(!part || !qty) return;

    if(!merged[part]){
      merged[part] = 0;
    }

    merged[part] += qty;
  });

  const finalRows = Object.entries(merged);

  // ✅ SHOW PROGRESS UI
  document.getElementById("uploadProgress").classList.remove("hidden");

  document.getElementById("pTotal").innerText = finalRows.length;

  let processed = 0;

  for(const [partNo, qty] of finalRows){

    if(cancelUploadFlag){
      showPopup("Upload Cancelled ❗", "warning");
      break;
    }

    const data = await getPartMasterByPartNo(partNo);

    if(!data){
      failed++;
    } else {

      addRow();

      const tr = document.querySelector("#tbody tr:last-child");

      tr.querySelector(".part").value = partNo;
      tr.querySelector(".qty").value = qty;

      tr.querySelector(".desc").innerText = data.Description;
      tr.querySelector(".dnp").innerText = data.DNP;
      tr.querySelector(".cat").innerText = data.Cat1;

      calc(tr);

      success++;
    }

    processed++;

    // ✅ UPDATE PROGRESS
    const percent = Math.floor((processed / finalRows.length) * 100);

    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("pSuccess").innerText = success;
    document.getElementById("pFailed").innerText = failed;
    document.getElementById("pRemaining").innerText =
      finalRows.length - processed;

    document.getElementById("progressText").innerText =
      `Processing ${processed}/${finalRows.length}`;

    await new Promise(r => setTimeout(r, 20));
  }

  hideLoader();

  setTimeout(()=>{
    document.getElementById("uploadProgress").classList.add("hidden");
  }, 800);

  showPopup(
    `Upload Complete ✅\n\n✔ Uploaded: ${success}\n❌ Failed: ${failed}`,
    success > 0 ? "success" : "error"
  );
}

async function loadManagerInventoryBranchDirectory(){
  const { data: branchMappings } = await db
    .from("branch_mapping")
    .select("*");
  const dedupMap = new Map();
  (branchMappings || []).forEach(m => {
    const code = (getUserField(m, ["branchcode", "branch_code"]) || "").toString().trim().toUpperCase();
    const rawName = (getUserField(m, ["branchname", "branch_name"]) || "").toString().trim();
    if(!code || !rawName) return;
    const name = code === "DFM003" ? "JABALPUR PARTS" : rawName;
    if(!dedupMap.has(code)){
      dedupMap.set(code, name);
    }
  });
  window.managerInvBranchDirectory = Array.from(dedupMap.entries())
    .sort((a, b) => a[1].localeCompare(b[1]))
    .map(([code, name]) => ({ code, name }));
}

async function performManagerInventoryLookup(){
  try{
    const input = document.getElementById("mgrInvLookupPartNo");
    const partNo = normalizePartNo(input?.value || "");
    const selectedDate = (window.managerInvLookupDate || new Date().toISOString().slice(0, 10)).toString();
    window.managerInvBranchTxnResults = [];
    window.managerInvLookupBranch = "ALL";
    window.managerInvLookupQuery = partNo;
    window.managerInvLookupResults = [];

    if(!partNo){
      window.managerInvLookupExpanded = false;
      loadSuper("Dashboard", true);
      return;
    }

    showLoader();
    const { data: inventoryRows, error } = await db
      .from("inventory_staging")
      .select("branch_code, item_code, item_name, item_group, dnp, rec_flag, nsp_flag, uom, received_qty, issued_qty, qty, inv_value, report_date")
      .ilike("item_code", `%${partNo}%`)
      .order("report_date", { ascending: false });
    hideLoader();

    if(error){
      showPopup(`Inventory lookup failed ❌\n${error.message || "Unknown error"}`);
      return;
    }

    const matchedRows = (inventoryRows || []).filter(r => normalizePartNo(r.item_code || "") === partNo);
    const workingRows = matchedRows.length ? matchedRows : (inventoryRows || []);
    const latestDate = (workingRows[0]?.report_date || selectedDate).toString().slice(0, 10);
    if(!latestDate){
      window.managerInvLookupExpanded = true;
      loadSuper("Dashboard", true);
      return;
    }
    window.managerInvLookupDate = latestDate;

    const latestByBranch = {};
    workingRows.forEach(r => {
      if(((r.report_date || "").toString().slice(0, 10)) !== latestDate) return;
      const code = (r.branch_code || "").toString().trim().toUpperCase();
      if(!code || latestByBranch[code]) return;
      latestByBranch[code] = r;
    });

    await loadManagerInventoryBranchDirectory();
    const branchNameByCode = {};
    (window.managerInvBranchDirectory || []).forEach(b => {
      branchNameByCode[b.code] = b.name;
    });

    window.managerInvLookupResults = Object.entries(latestByBranch)
      .map(([code, row]) => ({
        branch: branchNameByCode[code] || code,
        branch_code: code,
        item_code: row.item_code || partNo,
        item_name: row.item_name || "",
        item_group: row.item_group || "",
        dnp: row.dnp,
        rec_flag: row.rec_flag || "",
        nsp_flag: row.nsp_flag || "",
        uom: row.uom || "",
        received_qty: row.received_qty,
        issued_qty: row.issued_qty,
        qty: row.qty,
        inv_value: row.inv_value
      }))
      .sort((a, b) => a.branch.localeCompare(b.branch));
    window.managerInvLookupExpanded = true;

    loadSuper("Dashboard", true);
  } catch (err){
    hideLoader();
    console.error("performManagerInventoryLookup error", err);
    showPopup(`Inventory lookup failed ❌\n${err?.message || "Unknown error"}`);
  }
}

async function loadDeveloperDashboard(){
  stopDocketCameraScanner();
  window.activeTab = "DevDashboard";
  updateMenuHighlight();
  showLoader();
  try{
    const [{ data: users }, { data: requests }] = await Promise.all([
      db.from("users").select("id,Name,Role,Branch").order("Name", { ascending: true }),
      db.from("requests").select("id,OrderNo,OrderType,Status,created_at,OrderComments,Value,Qty,DNP,editedvalue,editedqty").order("created_at", { ascending: false })
    ]);
    const byOrder = {};
    (requests || []).forEach(r => {
      if(!byOrder[r.OrderNo]) byOrder[r.OrderNo] = { ...r, items: [] };
      byOrder[r.OrderNo].items.push(r);
    });
    const orderList = Object.values(byOrder);
    const statusMap = {};
    const typeMap = {};
    const getOrderValue = (o) => (o?.items || []).reduce((sum, x) => sum + Number(getEffectiveValue(x) || 0), 0);
    orderList.forEach(o => {
      const status = getOrderStatusLabel(o) || "UNKNOWN";
      if(!statusMap[status]) statusMap[status] = { count: 0, value: 0 };
      statusMap[status].count += 1;
      statusMap[status].value += getOrderValue(o);
      const type = (o.OrderType || "OTHER").toUpperCase();
      if(!typeMap[type]) typeMap[type] = { count: 0, value: 0 };
      typeMap[type].count += 1;
      typeMap[type].value += getOrderValue(o);
    });

    const comments = (requests || []).flatMap(getOrderCommentsWithMeta).filter(c => !isSystemActionComment(c));
    const seenAt = getDeveloperCommentSeenAt();
    const unreadComments = seenAt ? comments.filter(c => new Date(c?.at || 0).getTime() > new Date(seenAt).getTime()) : comments;

    const statusAction = (statusKey) => {
      const k = (statusKey || "").toUpperCase();
      if(k === "PENDING APPROVAL" || k === "APPROVAL PENDING") return `loadSuper('PendingApproval')`;
      if(k === "APPROVED") return `loadSuper('Approved')`;
      if(k === "REJECTED") return `loadSuper('Rejected')`;
      if(k === "PROCESSED") return `loadAdmin('Processed')`;
      if(k === "DISPATCHED" || k === "PARTIALLY DISPATCHED" || k === "NOT DESPATCHED") return `loadTrack('track')`;
      return `loadSuper('All')`;
    };
    const statusCards = Object.entries(statusMap)
      .sort((a, b) => b[1].count - a[1].count)
      .map(([k, v]) => `
        <button onclick="${statusAction(k)}"
          class="text-left rounded-md px-3 py-2 transition-all hover:-translate-y-[1px]"
          style="background:linear-gradient(180deg, rgba(20,25,40,0.98), rgba(7,11,23,0.98)); border:1px solid rgba(99,102,241,0.55); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 3px 0 rgba(30,41,59,0.95);">
          <div class="flex items-start justify-between gap-3">
            <span class="text-[11px] uppercase tracking-[0.12em] font-semibold" style="color:#a5b4fc;">${escapeHtml(k)}</span>
            <span class="text-2xl leading-none font-extrabold" style="color:#e2e8f0;">${v.count}</span>
          </div>
          <div class="text-[11px] mt-2 font-semibold" style="color:#93c5fd;">VALUE ₹ ${Math.round(v.value).toLocaleString("en-IN")}</div>
        </button>
      `).join("");
    const typeCards = Object.entries(typeMap)

async function createDeveloperUser(){
  const Name = (document.getElementById("devNewUserName")?.value || "").trim();
  const Branch = (document.getElementById("devNewUserBranch")?.value || "").trim();
  const Role = (document.getElementById("devNewUserRole")?.value || "").trim();
  const Password = (document.getElementById("devNewUserPassword")?.value || "").trim();
  if(!Name || !Branch || !Role || !Password) return showPopup("All fields are mandatory");
  showLoader();
  const { error } = await db.from("users").insert([{ Name, Branch, Role, Password }]);
  hideLoader();
  if(error) return showPopup(`Failed to add user ❌\n${error.message || ""}`);
  showPopup("User added ✅", "success");
  loadDeveloperUsers();
}

async function editDeveloperUser(id){
  if(!id) return;
  const { data, error } = await db.from("users").select("*").eq("id", id).maybeSingle();
  if(error || !data) return showPopup("User not found");
  const Name = prompt("Enter Name", data.Name || "");
  if(Name === null) return;
  const Branch = prompt("Enter Branch", data.Branch || "");
  if(Branch === null) return;
  const Role = prompt("Enter Role", data.Role || "");
  if(Role === null) return;
  const Password = prompt("Enter Password", data.Password || "");
  if(Password === null) return;
  showLoader();
  const { error: updateError } = await db.from("users").update({ Name, Branch, Role, Password }).eq("id", id);
  hideLoader();
  if(updateError) return showPopup(`Failed to update user ❌\n${updateError.message || ""}`);
  showPopup("User updated ✅", "success");
  loadDeveloperUsers();
}

async function deleteDeveloperUser(id){
  if(!id) return;
  if(!confirm("Hard delete this user permanently?")) return;
  showLoader();
  const { error } = await db.from("users").delete().eq("id", id);
  hideLoader();
  if(error) return showPopup(`Delete failed ❌\n${error.message || ""}`);
  showPopup("User deleted ✅", "success");
  loadDeveloperUsers();
}

async function editDeveloperRequestRow(id){
  if(!id) return;
  const { data, error } = await db.from("requests").select("*").eq("id", id).maybeSingle();
  if(error || !data) return showPopup("Request row not found");
  const editable = { ...data };
  const raw = prompt("Edit request row JSON", JSON.stringify(editable));
  if(raw === null) return;
  let payload = null;
  try{
    payload = JSON.parse(raw);
  }catch{
    return showPopup("Invalid JSON");
  }
  delete payload.id;
  showLoader();
  const { error: updateError } = await db.from("requests").update(payload).eq("id", id);
  hideLoader();
  if(updateError) return showPopup(`Update failed ❌\n${updateError.message || ""}`);
  showPopup("Request updated ✅", "success");
  loadDeveloperRequestsEditor();
}

CURRENT_PAGE = 1;

async function loadSuper(activeTab = "PendingApproval", skipReset = false){
  stopDocketCameraScanner();

  if(!skipReset){
    CURRENT_PAGE = 1;
  }

  window.activeTab = activeTab;
  updateMenuHighlight();
  showLoader();

  const user = getUser();
  const isManager = isManagerRole(user) || isDeveloperRole(user);

  let query = db
    .from("requests")
    .select(REQUEST_LIST_SELECT)
    .order("created_at",{ascending:false});

  if(isManager){
    // Manager can view all orders in All Orders tab.
  } else {
    query = query.or(`ApprovedBy.eq.${user.Name},ApprovedBySuper.eq.${user.Name}`);
  }

  const { data } = await query;
  GLOBAL_DATA = data || [];
  hideLoader();

  // GROUP
const grouped = {};
(GLOBAL_DATA || []).forEach(r=>{

  // ✅ ADD THIS LINE (MANDATORY FIX)
  if(!r.ApprovalStatus || isPendingApprovalStatus(r.ApprovalStatus)){
    r.ApprovalStatus = "PendingApproval";
    r.Status = "PENDING APPROVAL";
  }

  if(!grouped[r.OrderNo]){
    grouped[r.OrderNo] = { ...r, items:[] };
  }
  grouped[r.OrderNo].items.push(r);
});

  const allOrders = applyOrderSort(
    Object.values(grouped).sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
  );
  const orders = allOrders.filter(shouldShowOrder);

  if(isManager && activeTab === "Dashboard"){
    renderManagerDashboard(orders);
    return;
  }

  // FILTER TABS
  let filtered;

if(activeTab === "PendingApproval"){
  filtered = orders.filter(o => {
    const pending = getOrderStatusLabel(o) === "PENDING APPROVAL";
    if(!pending) return false;
    if(isManager) return true;
    const forwardedByCurrentSuper = o.items.some(x => {
      const approval = (x.ApprovalStatus || "").toString().trim().toUpperCase();
      return (approval === "PENDINGMANAGERAPPROVAL" || approval === "PENDING MANAGER APPROVAL")
        && (x.ApprovedBySuper || "") === (user?.Name || "");
    });
    return !forwardedByCurrentSuper;
  });
}
else if(activeTab === "Approved"){
  filtered = orders.filter(o => {
    const approved = getOrderStatusLabel(o) === "APPROVED";
    if(isManager) return approved;
    const forwardedByCurrentSuper = o.items.some(x => {
      const approval = (x.ApprovalStatus || "").toString().trim().toUpperCase();
      return (approval === "PENDINGMANAGERAPPROVAL" || approval === "PENDING MANAGER APPROVAL")
        && (x.ApprovedBySuper || "") === (user?.Name || "");
    });
    return approved || forwardedByCurrentSuper;
  });
}
else if(activeTab === "Rejected"){
  const rejectedSource = isDeveloperRole(user) ? allOrders : orders;
  filtered = rejectedSource.filter(o => getOrderStatusLabel(o) === "REJECTED");
}
else if(activeTab === "All"){
  filtered = isManager
    ? orders
    : orders.filter(o =>
        o.items.some(x =>
          x.ApprovedBy === getUser().Name || x.ApprovedBySuper === getUser().Name
        )
      );
}
  else{
    filtered = orders;
  }

  // PAGINATION
const start = (CURRENT_PAGE - 1) * PAGE_SIZE;
const paginatedOrders = filtered.slice(start, start + PAGE_SIZE);
const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

    
  // UI (reuse same table)
  let html = `
  <div class="space-y-4">
    <div class="relative pc-section">
      <div class="absolute -top-3 left-4 px-3" style="background: var(--pc-bg);">
        <span class="text-xs font-semibold tracking-wider" style="color: var(--pc-secondary);">
          ${activeTab.toUpperCase()} ORDERS
        </span>
      </div>

      <div class="overflow-x-auto mt-2">
	        <table class="track-table w-full text-sm text-left border rounded-lg overflow-hidden">
          <thead class="text-xs uppercase tracking-wider border-b"
            style="background: var(--pc-warm); color: var(--pc-text);">
            <tr>

            
            
              <th>Date</th>
              <th>Order Type</th>
              <th class="text-left">Customer</th>
              <th class="text-left">Branch</th>
              <th>Qty</th>
              <th>Value</th>
              <th>Order No</th>
	              <th class="px-4 py-3 text-left">Status</th>
            </tr>
          </thead>
          <tbody>
  `;

  paginatedOrders.forEach(o=>{
    const tableStatusRaw = getOrderStatusLabel(o);
    const tableStatus = tableStatusRaw === "PENDING APPROVAL" ? "Pending Approval" :
      tableStatusRaw === "PARTIALLY DISPATCHED" ? "Partially Dispatched" :
      tableStatusRaw === "NOT DESPATCHED" ? "Not Dispatched" :
      tableStatusRaw.charAt(0) + tableStatusRaw.slice(1).toLowerCase();
      
    const total = o.items.reduce((s,x)=>s+getEffectiveValue(x),0);

    html += `
            <tr onclick="openOrderView('${o.OrderNo}')"
            class="cursor-pointer transition hover:scale-[1.01]"
            style="${getOrderTypeRowStyle(o.OrderType)}">
      <td>${formatDateTime(o.created_at)}</td>
      <td>
        <span class="px-2 py-1 rounded-full text-xs font-semibold"
          style="
            background:${
              o.OrderType === 'VOR' ? '#fef3c7' :
              o.OrderType === 'SOP' ? '#dbeafe' :
              o.OrderType === 'ZMAC' ? '#e0e7ff' :
              '#ede9fe'
            };
            color:${
              o.OrderType === 'VOR' ? '#92400e' :

              o.OrderType === 'ZMAC' ? '#3730a3' :

            };
          ">
          ${o.OrderType || "-"}
        </span>
      </td>
      <td class="text-left">${o.CustomerName || "Stock"}</td>

      <td>₹ ${total.toLocaleString("en-IN")}</td>
      <td>
        ${o.OrderNo}
        ${getOrderCommentCount(o) > 0
          ? `<span class="ml-1 px-2 py-[2px] rounded-full text-[10px]" style="background:#e0e7ff;color:#3730a3;">💬 ${getOrderCommentCount(o)}</span>`
          : ""}
      </td>
	      <td class="px-4 py-3 text-left">
      <span class="px-2 py-1 rounded text-xs font-semibold"
        style="${getStatusChipStyle(tableStatusRaw)}">
        ${tableStatus}
      </span>
    </td>
    </tr>`;
  });

  html += `
          </tbody>
        </table>
      </div>




<div class="flex justify-between items-center mt-2 px-2 py-0.5 rounded-md text-[11px]" style="background:linear-gradient(90deg, #2f3e4d, #3f556b); border:1px solid #5b748d; color:#f8fafc;">

  <button onclick="changePage(-1)"
    class="px-2.5 py-0.5 rounded font-semibold text-[11px]"
    style="background: var(--pc-surface); border:1px solid var(--pc-border); color:#0f172a;"
    ${CURRENT_PAGE === 1 ? "disabled opacity-50 cursor-not-allowed" : ""}>
    ⬅ Prev

  <span class="font-semibold tracking-wide leading-none">
    Page ${CURRENT_PAGE} / ${totalPages}
  </span>

  <button onclick="changePage(1)"

    style="background: var(--pc-secondary); color:white;"
    ${CURRENT_PAGE >= totalPages ? "disabled opacity-50 cursor-not-allowed" : ""}>
    Next ➡
  </button>

</div>

  document.getElementById("main").innerHTML = html;

async function updateApproval(orderNo, status){

  showLoader();
  const user = getUser();
  const isManager = isManagerRole(user);

  const approvalUpdateData = { ApprovalStatus: status };
  if(status === "Approved"){
    if(isManager){
      approvalUpdateData.Status = "Approved";
      approvalUpdateData.ApprovalStatus = "Approved";
      approvalUpdateData.ApprovedAt = new Date().toISOString();
    } else {
      const managerName = await getDefaultManagerApprover(user?.Name || "");
      if(managerName){
        approvalUpdateData.Status = "PENDING APPROVAL";
        approvalUpdateData.ApprovalStatus = "PendingManagerApproval";
        approvalUpdateData.ApprovedBy = managerName;
        approvalUpdateData.ApprovedBySuper = user.Name || "";
        approvalUpdateData.ApprovedAt = new Date().toISOString();
      } else {
        // Fallback: if no manager configured, keep existing single-step behavior.
        approvalUpdateData.Status = "Approved";
        approvalUpdateData.ApprovalStatus = "Approved";
        approvalUpdateData.ApprovedBySuper = user.Name || "";
        approvalUpdateData.ApprovedAt = new Date().toISOString();
      }
    }
  } else if(status === "Rejected"){
    approvalUpdateData.Status = "Rejected";
  }

  const { error } = await db
    .from("requests")
    .update(approvalUpdateData)
    .eq("OrderNo", orderNo);

  hideLoader();

  if(error){
    return showPopup("Update failed ❌");
  }

  await appendOrderActionLog(
    orderNo,
    status === "Approved"
      ? (isManager ? "MANAGER_APPROVED" : "SUPER_FORWARDED_MANAGER")
      : (isManager ? "MANAGER_REJECTED" : "SUPER_REJECTED"),
    status === "Approved"
      ? (isManager
          ? `Order approved by ${user.Name || "Unknown User"}.`
          : `Order approved by ${user.Name || "Unknown User"} and forwarded to manager.`)
      : `Order rejected by ${user.Name || "Unknown User"}.`
  );
  showPopup("Updated successfully ✅");

  loadSuper(window.activeTab);
}

async function saveEditedQty(orderNo, rowId, partNo, createdAt, value, originalQty, originalValue){
  const parsed = value === "" ? null : Math.max(0, Number(value || 0));
  const baseQty = Number(originalQty || 0);
  const baseValue = Number(originalValue || 0);
  const unitValue = baseQty > 0 ? (baseValue / baseQty) : 0;
  const recalculatedValue = parsed === null ? null : Number((unitValue * parsed).toFixed(2));

  showLoader();
  let query = db
    .from("requests")
    .update({ editedqty: parsed, editedvalue: recalculatedValue });

  if(rowId){
    query = query.eq("id", rowId);
  }else{
    query = query.eq("OrderNo", orderNo).eq("PartNo", partNo);
    if(createdAt) query = query.eq("created_at", createdAt);
  }

  const { error } = await query;
  hideLoader();

  if(error){
    return showPopup("Failed to save edited qty ❌");
  }

  if(!window.superAcceptedEdits) window.superAcceptedEdits = {};
  window.superAcceptedEdits[orderNo] = false;

  openOrderView(orderNo);
}

async function appendOrderActionLog(orderNo, action, text, meta = {}){
  try{
    const user = getUser() || {};
    const actor = user.Name || "Unknown User";
    const nowIso = new Date().toISOString();

    const { data: firstRow, error: rowError } = await db
      .from("requests")
      .select("id, OrderComments")
      .eq("OrderNo", orderNo)
      .order("id", { ascending: true })
      .limit(1);

    if(rowError || !firstRow?.length) return;

    const existing = getOrderComments({ OrderComments: firstRow[0].OrderComments });
    existing.push({
      type: "system_action",
      action,
      by: actor,
      text,
      at: nowIso,
      meta
    });

    await db
      .from("requests")
      .update({ OrderComments: JSON.stringify(existing) })
      .eq("id", firstRow[0].id);
  }catch(err){
    console.warn("appendOrderActionLog failed", err);
  }
}

async function addOrderComment(orderNo){
  const input = document.getElementById("orderCommentInput");
  const fileInput = document.getElementById("commentAttachment");
  const text = (input?.value || "").trim();
  if(!text){
    return showPopup("Please enter comment ❗");
  }

  let attachmentUrl = "";
  let attachmentName = "";
  const file = fileInput?.files?.[0];
  if(file){
    attachmentName = file.name;
    attachmentUrl = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result || "");
      reader.onerror = () => resolve("");
      reader.readAsDataURL(file);
    });
  }

  const user = getUser();
  const allRowsForComments = await db
    .from("requests")
    .select("OrderComments")
    .eq("OrderNo", orderNo);

  let targetRow = null;
  const firstById = await db
    .from("requests")
    .select("id, OrderComments")
    .eq("OrderNo", orderNo)
    .order("id", { ascending: true })
    .limit(1);

  if(!firstById.error && firstById.data?.length){
    targetRow = {
      id: firstById.data[0].id,
      OrderComments: firstById.data[0].OrderComments
    };
  }else{
    const firstFallback = await db
      .from("requests")
      .select("OrderComments, created_at, PartNo")
      .eq("OrderNo", orderNo)
      .order("created_at", { ascending: true })
      .limit(1);
    if(firstFallback.data?.length){
      targetRow = {
        created_at: firstFallback.data[0].created_at,
        PartNo: firstFallback.data[0].PartNo,
        OrderComments: firstFallback.data[0].OrderComments
      };
    }
  }

  if(!targetRow){
    return showPopup("Failed to add comment ❌ (Order row not found)");
  }

    const existing = getOrderComments({ items: allRowsForComments.data || [], OrderComments: targetRow.OrderComments });
  existing.push({
    type: "user",
    by: user.Name || user.Role || user.role || "User",
    text,
    at: new Date().toISOString(),
    attachmentName,
    attachmentUrl
  });

  showLoader();
  let updateQuery = db
    .from("requests")
    .update({ OrderComments: JSON.stringify(existing) });

  if(targetRow.id !== undefined){
    updateQuery = updateQuery.eq("id", targetRow.id);
  }else{
    updateQuery = updateQuery
      .eq("OrderNo", orderNo)
      .eq("created_at", targetRow.created_at)
      .eq("PartNo", targetRow.PartNo);
  }

  const { error } = await updateQuery;
  hideLoader();

  if(error){
    return showPopup("Failed to add comment ❌ (Please ensure OrderComments column exists in requests table)");
  }
  const composer = document.getElementById("commentComposer");
  const postBtn = document.getElementById("postCommentBtn");
  composer?.classList.add("hidden");
  postBtn?.classList.add("hidden");
  showPopup("Comment added ✅");
  openOrderView(orderNo);

async function acceptEditedQty(orderNo){
  showLoader();
  const { data } = await db
    .from("requests")
    .select("id, OrderNo, PartNo, Branch, Qty, DNP, Value, editedqty")
    .eq("OrderNo", orderNo);

  const rows = data || [];
  if(rows.length){
    const prevDays = Number(window.prevQtyDays) || 30;
    const partNos = [...new Set(rows.map(r => normalizePartNo(r.PartNo)).filter(Boolean))];
    const prevQtyMap = {};

    if(partNos.length){
      const sinceDate = new Date();
      sinceDate.setDate(sinceDate.getDate() - prevDays);
      const { data: prevRows } = await db
        .from("requests")
        .select("PartNo, Qty, editedqty")
        .eq("Branch", rows[0].Branch)
        .in("PartNo", partNos)
        .neq("Status", "REJECTED")
        .neq("ApprovalStatus", "Rejected")
        .gte("created_at", sinceDate.toISOString())
        .neq("OrderNo", orderNo);

      (prevRows || []).forEach(pr => {
        const key = normalizePartNo(pr.PartNo);
        prevQtyMap[key] = (prevQtyMap[key] || 0) + getEffectiveQty(pr);
      });
    }

    for(const r of rows){
      const hasPersistedEdit = r.editedqty !== null && r.editedqty !== undefined && r.editedqty !== "";
      const prevQty = prevQtyMap[normalizePartNo(r.PartNo)] || 0;
      const originalQty = Number(r.Qty || 0);
      const targetEditedQty = hasPersistedEdit
        ? Math.max(0, Number(r.editedqty || 0))
        : Math.max(0, originalQty - prevQty);

      const baseValue = Number(r.Value || 0);
      const unitValue = originalQty > 0 ? (baseValue / originalQty) : Number(r.DNP || 0);
      const targetEditedValue = Number((unitValue * targetEditedQty).toFixed(2));

      await db
        .from("requests")
        .update({ editedqty: targetEditedQty, editedvalue: targetEditedValue })
        .eq("id", r.id);
    }
  }
  hideLoader();

  if(!window.superAcceptedEdits) window.superAcceptedEdits = {};
  window.superAcceptedEdits[orderNo] = true;
  await appendOrderActionLog(orderNo, "SUPER_ACCEPTED_EDITS", `Edited quantities accepted for approval by ${getUser()?.Name || "Unknown User"}.`);
  showPopup("Edited qty accepted for approval ✅");
  openOrderView(orderNo);
}

function escapeHtml(value){
  return (value ?? "")
    .toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getPrintableStatusLabel(status){
  const s = normalizeRowStatus(status);
  if(s === "PENDING APPROVAL") return "Pending Approval";
  if(s === "PARTIALLY DISPATCHED") return "Partially Dispatched";
  if(s === "NOT DESPATCHED") return "Not Dispatched";
  return s.charAt(0) + s.slice(1).toLowerCase();
}

function changePage(direction){

  const user = getUser();

  let grouped = {};

  GLOBAL_DATA.forEach(r => {
    if(!grouped[r.OrderNo]){
      grouped[r.OrderNo] = [];
    }
    grouped[r.OrderNo].push(r);
  });

  let orders = Object.values(grouped);

  if(isAdminRole(user)){

    if(window.activeTab === "Approved"){
      orders = orders.filter(o => getOrderStatusLabel(o) === "APPROVED");
    } else {
      orders = orders.filter(o => {
        const status = getOrderStatusLabel(o);
        return status !== "APPROVED" && status !== "PENDING APPROVAL" && status !== "REJECTED";
      });
    }

  } else {
    orders = orders.filter(o => 
      o.every(x => x.Branch === getUserBranch(user))
    );
  }

  const totalPages = Math.max(1, Math.ceil(orders.length / PAGE_SIZE));

  CURRENT_PAGE += direction;

  if(CURRENT_PAGE < 1) CURRENT_PAGE = 1;
  if(CURRENT_PAGE > totalPages) CURRENT_PAGE = totalPages;

  // 🔥 THIS IS THE REAL FIX
  if(isAdminRole(user)){
    loadAdmin(window.activeTab, true);
  } else {
    loadTrack("track", true);
  }
}

async function downloadOrderExcel(orderNo){

  showLoader();

  const { data } = await db
    .from("requests")
    .select("*")
    .eq("OrderNo", orderNo);

  hideLoader();

  if(!data || !data.length){
    return showPopup("No data found ❗");
  }

  // FORMAT DATA FOR EXCEL
  const excelData = data.map(r => ({
    "Order No": r.OrderNo,
    "Branch": r.Branch,
    "Order Type": r.OrderType,
    "Order For": r.OrderFor,
    "Machine No": r.MachineNo,
    "Customer": r.CustomerName,
    "Part No": r.PartNo,
    "Description": r.Description,
    "Qty": getEffectiveQty(r),
    "Billed Qty": r.BilledQty || 0,
    "Pending Qty": getEffectiveQty(r) - (r.BilledQty || 0),
    "Value": getEffectiveValue(r),
    "Status": r.Status,
    "Processed Date": r.ProcessedDate || "",
    "Bill No": r.BillNo || "",
    "Transport": r.TransportName || "",
    "Docket": r.Docket || ""
  }));

  // CREATE SHEET
  const ws = XLSX.utils.json_to_sheet(excelData);

  // AUTO COLUMN WIDTH
  const colWidths = Object.keys(excelData[0]).map(key => ({
    wch: Math.max(key.length, 15)
  }));
  ws['!cols'] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Order");

  // DOWNLOAD
  XLSX.writeFile(wb, `Order_${orderNo}.xlsx`);
}

function getSortableCellValue(text){
  const raw = (text || "").trim();
  const numeric = Number(raw.replace(/[^0-9.-]/g, ""));
  if(raw && !Number.isNaN(numeric) && /[0-9]/.test(raw)){
    return { type: "number", value: numeric };
  }
  return { type: "string", value: raw.toLowerCase() };
}

document.addEventListener("click", function(evt){
  const th = evt.target.closest("th");
  if(!th || !th.closest("thead")) return;

  const table = th.closest("table");
  const tbody = table?.querySelector("tbody");
  if(!tbody) return;

  const headerRow = th.parentElement;
  const headers = Array.from(headerRow.children);
  const colIndex = headers.indexOf(th);
  if(colIndex < 0) return;

  const current = th.classList.contains("sort-asc") ? "asc"
    : th.classList.contains("sort-desc") ? "desc"
    : "";
  const next = current === "asc" ? "desc" : "asc";
  const headerKey = (th.innerText || "").replace(/[▲▼]/g, "").trim().toUpperCase();

  headers.forEach(h => h.classList.remove("sort-asc", "sort-desc"));
  th.classList.add(next === "asc" ? "sort-asc" : "sort-desc");

  if(table.classList.contains("track-table")){
    TABLE_SORT_STATE = { key: headerKey, dir: next };
    CURRENT_PAGE = 1;
    refreshCurrentView();
    return;
  }

  const rows = Array.from(tbody.querySelectorAll("tr"));
  rows.sort((a, b) => {
    const aText = a.children[colIndex]?.innerText || "";
    const bText = b.children[colIndex]?.innerText || "";
    const av = getSortableCellValue(aText);
    const bv = getSortableCellValue(bText);

    let result = 0;
    if(av.type === "number" && bv.type === "number"){
      result = av.value - bv.value;
    }else{
      result = av.value.localeCompare(bv.value);
    }
    return next === "asc" ? result : -result;
  });

  rows.forEach(r => tbody.appendChild(r));
});
